<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>РИТМ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #9d4edd;
            --primary-dark: #7b2cbf;
            --secondary: #00bbf9;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(20, 10, 30, 0.7);
            --glass-border: rgba(157, 78, 221, 0.2);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            --cancel-color: #ff4b4b;
            --admin-badge: #ff006e;
            --success: #00bbf9;
            --goal-1: #9d4edd;
            --goal-2: #00bbf9;
            --goal-3: #ff9f1c;
            --celebration: #ffd700;
            --notification: #ff9f1c;
            --app-bg: linear-gradient(145deg, #0f0f1a 0%, #1a1025 100%);
            --header-bg: linear-gradient(180deg, rgba(26, 16, 37, 0.95) 0%, rgba(26, 16, 37, 0.8) 100%);
            --modal-bg: #1a1025;
            --note-bg: rgba(157, 78, 221, 0.15);
            --filter-bg: rgba(157, 78, 221, 0.2);
            --filter-empty: rgba(255, 255, 255, 0.05);
            --weather-bg: rgba(0, 187, 249, 0.15);
        }

        body.light-theme {
            --primary: #0066cc;
            --primary-dark: #0052a3;
            --secondary: #4da6ff;
            --bg-dark: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 102, 204, 0.2);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --cancel-color: #dc2626;
            --admin-badge: #2563eb;
            --success: #059669;
            --goal-1: #2563eb;
            --goal-2: #4f46e5;
            --goal-3: #ea580c;
            --celebration: #fbbf24;
            --notification: #f97316;
            --app-bg: linear-gradient(145deg, #f1f5f9 0%, #ffffff 100%);
            --header-bg: rgba(255, 255, 255, 0.95);
            --modal-bg: #ffffff;
            --note-bg: rgba(0, 102, 204, 0.1);
            --filter-bg: rgba(0, 102, 204, 0.15);
            --filter-empty: rgba(0, 0, 0, 0.03);
            --weather-bg: rgba(0, 187, 249, 0.1);
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            transition: background-color 0.3s ease;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            height: 100dvh;
            background: var(--app-bg);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            margin: 0 auto;
            transition: background 0.3s ease;
        }

        .app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        .app-header {
            padding: 18px 20px 10px;
            text-align: center;
            background: var(--header-bg);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            position: relative;
            transition: background 0.3s ease;
        }

        .app-header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            cursor: pointer;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            transition: all 0.2s ease;
        }

        .app-header h1:active {
            transform: scale(0.95);
        }

        .app-header p {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .admin-badge {
            position: absolute;
            top: 10px;
            right: 15px;
            background: var(--admin-badge);
            color: white;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .admin-badge.active {
            opacity: 1;
        }

        .nav-bar {
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 12px;
            background: rgba(26, 16, 37, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            gap: 5px;
        }

        body.light-theme .nav-bar {
            background: rgba(255, 255, 255, 0.9);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            padding: 8px 0;
            border-radius: 20px;
            flex: 1;
            max-width: 120px;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            transition: all 0.2s ease;
        }

        .nav-item.active svg {
            color: var(--primary);
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 18px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .content::-webkit-scrollbar {
            display: none;
        }

        /* Хаб стили */
        .hub-greeting {
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hub-avatar {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 600;
            color: white;
        }

        .hub-greeting-text h2 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .hub-greeting-text p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .hub-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .hub-widget {
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .hub-widget:active {
            transform: scale(0.97);
            background: var(--filter-bg);
        }

        .hub-widget-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .hub-widget-icon {
            width: 32px;
            height: 32px;
            border-radius: 16px;
            background: var(--filter-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--primary);
        }

        .hub-widget-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .hub-widget-content {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .hub-widget-sub {
            font-size: 11px;
            color: var(--text-muted);
        }

        .weather-widget {
            grid-column: span 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .weather-widget:active {
            transform: scale(0.98);
            background: var(--filter-bg);
        }

        .weather-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .weather-icon {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: var(--weather-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .weather-temp {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .weather-city {
            font-size: 13px;
            color: var(--text-muted);
        }

        .weather-desc {
            text-align: right;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .quick-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .quick-stat {
            background: var(--filter-empty);
            border-radius: 16px;
            padding: 12px 4px;
            text-align: center;
            border: 1px solid var(--glass-border);
        }

        .quick-stat-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 2px;
        }

        .quick-stat-label {
            font-size: 10px;
            color: var(--text-muted);
        }

        .filter-compact {
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 18px;
            border: 1px solid var(--glass-border);
        }

        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .filter-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-title svg {
            width: 16px;
            height: 16px;
            color: var(--primary);
        }

        .filter-badge {
            background: var(--filter-bg);
            color: var(--primary);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .filter-clear {
            color: var(--primary);
            font-size: 12px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 12px;
            background: var(--filter-bg);
        }

        .filter-rows {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--filter-empty);
            border-radius: 16px;
            padding: 6px 12px 6px 16px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-row:hover {
            background: var(--filter-bg);
        }

        .filter-row.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
        }

        .filter-row.active .row-label,
        .filter-row.active .row-group,
        .filter-row.active .row-icon {
            color: white;
        }

        .row-icon {
            font-size: 14px;
            color: var(--text-muted);
        }

        .row-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 45px;
        }

        .row-group {
            flex: 1;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row-group.empty {
            color: var(--text-muted);
            font-style: italic;
        }

        .row-remove {
            width: 24px;
            height: 24px;
            border-radius: 12px;
            background: rgba(255, 75, 75, 0.2);
            color: var(--cancel-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 2000;
            padding: 16px;
            box-sizing: border-box;
        }

        .group-select-modal {
            width: 100%;
            max-width: 320px;
            background: var(--modal-bg);
            border-radius: 28px;
            padding: 24px 20px;
            border: 2px solid var(--primary);
            box-shadow: 0 20px 40px rgba(157, 78, 221, 0.4);
        }

        .modal-title {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .groups-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 4px;
        }

        .groups-list::-webkit-scrollbar {
            width: 4px;
        }

        .groups-list::-webkit-scrollbar-track {
            background: var(--filter-empty);
            border-radius: 2px;
        }

        .groups-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 2px;
        }

        .group-item {
            padding: 14px 16px;
            margin-bottom: 6px;
            background: var(--filter-empty);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .group-item:active {
            background: var(--filter-bg);
            transform: scale(0.98);
        }

        .group-item.selected {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
        }

        .group-item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .modal-close-btn {
            width: 100%;
            padding: 14px;
            background: var(--filter-empty);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-close-btn:active {
            background: var(--filter-bg);
        }

        .goal-modal-content {
            width: 100%;
            max-width: 360px;
            background: var(--modal-bg);
            border-radius: 32px;
            padding: 28px 24px;
            border: 2px solid var(--primary);
            box-shadow: 0 20px 40px rgba(157, 78, 221, 0.4);
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }

        .goal-modal-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }

        .goal-input, .note-textarea {
            width: 100%;
            padding: 18px 20px;
            margin: 12px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 16px;
            text-align: left;
            transition: all 0.3s ease;
        }

        .note-textarea {
            min-height: 120px;
            resize: vertical;
            border-radius: 20px;
        }

        body.light-theme .goal-input, body.light-theme .note-textarea {
            background: rgba(0, 0, 0, 0.03);
        }

        .goal-input:focus, .note-textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(157, 78, 221, 0.1);
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.3);
        }

        .goal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .goal-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 24px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .goal-btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .goal-btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
        }

        .calendar-wrapper {
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 18px;
            border: 1px solid var(--glass-border);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .calendar-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .calendar-nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 8px;
            text-align: center;
        }

        .weekday {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            position: relative;
            color: var(--text-primary);
        }

        .calendar-day.has-training {
            background: rgba(157, 78, 221, 0.2);
            color: var(--primary);
            font-weight: 600;
        }

        body.light-theme .calendar-day.has-training {
            background: rgba(0, 102, 204, 0.15);
        }

        .calendar-day.selected {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .training-count {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--primary);
            color: white;
            font-size: 9px;
            width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .trainings-container {
            margin-top: 14px;
        }

        .trainings-title {
            font-size: 15px;
            margin-bottom: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trainings-title span {
            background: rgba(157, 78, 221, 0.2);
            padding: 4px 10px;
            border-radius: 14px;
            font-size: 12px;
            color: var(--primary);
        }

        .training-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            margin-bottom: 8px;
            border-left: 4px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .training-item:active {
            transform: scale(0.98);
            background: rgba(157, 78, 221, 0.1);
        }

        body.light-theme .training-item {
            background: rgba(0, 0, 0, 0.02);
        }

        .training-item.has-note {
            border-left-color: var(--success);
            background: var(--note-bg);
        }

        .training-item.filtered-out {
            display: none;
        }

        .training-time {
            background: rgba(157, 78, 221, 0.2);
            padding: 5px 10px;
            border-radius: 18px;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
        }

        .training-item.has-note .training-time {
            background: rgba(0, 187, 249, 0.3);
            color: var(--success);
        }

        .training-name {
            flex: 1;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .note-indicator {
            width: 24px;
            height: 24px;
            border-radius: 12px;
            background: var(--success);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }

        .profile-header {
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            padding: 24px 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 600;
            color: white;
            box-shadow: 0 10px 20px rgba(157, 78, 221, 0.3);
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .profile-id {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .theme-toggle {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .theme-circle {
            width: 44px;
            height: 44px;
            border-radius: 22px;

        .toast {

        @keyframes slideUp {

        /* Админ панель - адаптирована под обе темы */

        <!-- АДМИН ПАНЕЛЬ - ПЕРЕНЕСЕНА ИЗ ПЕРВОГО ФАЙЛА И АДАПТИРОВАНА ПОД ТЕМЫ -->

    <script>
        // Константы
        const STORAGE_KEYS = {
            CANCELLED_TRAININGS: 'ritm_cancelled_trainings',
            PROFILE: 'ritm_profile',
            USER_GROUP: 'ritm_user_group',
            NOTIFICATIONS: 'ritm_notifications',
            THEME: 'ritm_theme',
            TRAINING_NOTES: 'ritm_training_notes',
            SELECTED_GROUPS: 'ritm_selected_groups',
            WEATHER: 'ritm_weather'
        };

        // Расписание
        const WEEKLY_SCHEDULE = {
            1: [ // Понедельник
                { time: '17:15', name: 'Ритмика (3-5 лет)' },
                { time: '18:00', name: 'Калланетика' },
                { time: '19:00', name: 'Латина (старшая)' },
                { time: '20:00', name: 'Латина (новички)' }
            ],
            2: [ // Вторник
                { time: '18:00', name: 'Бальные танцы (5-6 лет)' },
                { time: '19:00', name: 'Бальные танцы (7-9 лет)' }
            ],
            3: [ // Среда
                { time: '18:00', name: 'Бальные танцы' },
                { time: '19:00', name: 'Латина (старшая)' },
                { time: '20:00', name: 'Индивидуальные' }
            ],
            4: [ // Четверг
                { time: '18:00', name: 'Бальные танцы (5-6 лет)' },
                { time: '19:00', name: 'Бальные танцы (9-12 лет)' },
                { time: '20:00', name: 'Бачата (новички)' }
            ],
            5: [ // Пятница
                { time: '17:15', name: 'Ритмика (3-5 лет)' },
                { time: '18:00', name: 'Бальные танцы' },
                { time: '19:00', name: 'Индивидуальные' }
            ],
            6: [ // Суббота
                { time: '9:00', name: 'Калланетика' },
                { time: '10:00', name: 'Бачата + Латина' },
                { time: '11:00', name: 'Бальные танцы (9-12 лет)' },
                { time: '12:00', name: 'Индивидуальные' }
            ],
            0: [] // Воскресенье
        };

        // Группы
        const ALL_GROUPS = [
            'Ритмика (3-5 лет)',
            'Бальные танцы (5-6 лет)',
            'Бальные танцы (7-9 лет)',
            'Бальные танцы (9-12 лет)',
            'Латина (новички)',
            'Латина (старшая)',
            'Калланетика',
            'Бачата (новички)',
            'Индивидуальные'
        ];

        // Данные приложения
        let appData = {
            cancelledTrainings: {},
            profile: {
                goals: []
            },
            userGroup: '',
            notifications: [],
            trainingNotes: {},
            selectedGroups: [],
            weather: {
                feels_like: '--',
                humidity: '--',
                wind: '--',
                description: 'Загрузка...',
                icon: '☁️',
                city: 'Калининград',
                lastUpdate: null
            }
        };
        
        let currentPage = 'hub';
        let selectedDate = new Date().toISOString().split('T')[0];
        let currentMonth = new Date();
        let isAdmin = false;
        let tg = null;
        let cloudStorage = null;
        let tgUser = 'Танцор';
        let activeFilterRow = null;

        // Инициализация Telegram
        try {
            if (window.Telegram && Telegram.WebApp) {
                tg = Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    tgUser = user.first_name || user.username || 'Танцор';
                }
                
                cloudStorage = tg.CloudStorage;
            }
        } catch (e) {
            console.log('Не удалось инициализировать Telegram:', e);
        }

        // Функции для работы с темой
        function setTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-theme');
            } else {
                document.body.classList.remove('light-theme');
            }
            
            try {
                if (cloudStorage) {
                    cloudStorage.setItem(STORAGE_KEYS.THEME, theme, () => {});
                } else {
                    localStorage.setItem(STORAGE_KEYS.THEME, theme);
                }
            } catch (e) {}
        }

        function loadTheme() {
            return new Promise((resolve) => {
                try {
                    if (cloudStorage) {
                        cloudStorage.getItem(STORAGE_KEYS.THEME, (error, value) => {
                            if (!error && value) {
                                setTheme(value);
                            } else {
                                setTheme('dark');
                            }
                            resolve();
                        });
                    } else {
                        const savedTheme = localStorage.getItem(STORAGE_KEYS.THEME);
                        if (savedTheme) {
                            setTheme(savedTheme);
                        } else {
                            setTheme('dark');
                        }
                        resolve();
                    }
                } catch (e) {
                    setTheme('dark');
                    resolve();
                }
            });
        }

        // Загрузка данных
        function loadData() {
            try {
                if (cloudStorage) {
                    cloudStorage.getItem(STORAGE_KEYS.CANCELLED_TRAININGS, (error, value) => {
                        if (!error && value) {
                            try {
                                appData.cancelledTrainings = JSON.parse(value);
                                if (currentPage === 'schedule') renderSchedule();
                                else if (currentPage === 'hub') renderHub();
                            } catch (e) {}
                        }
                    });
                    
                    cloudStorage.getItem(STORAGE_KEYS.PROFILE, (error, value) => {
                        if (!error && value) {
                            try {
                                appData.profile = JSON.parse(value);
                                if (currentPage === 'profile') renderProfile();
                                else if (currentPage === 'hub') renderHub();
                            } catch (e) {}
                        }
                    });
                    
                    cloudStorage.getItem(STORAGE_KEYS.USER_GROUP, (error, value) => {
                        if (!error && value) {
                            appData.userGroup = value;
                            if (currentPage === 'profile') renderProfile();
                            else if (currentPage === 'hub') renderHub();
                        }
                    });
                    
                    cloudStorage.getItem(STORAGE_KEYS.NOTIFICATIONS, (error, value) => {
                        if (!error && value) {
                            try {
                                appData.notifications = JSON.parse(value);
                                if (currentPage === 'profile') renderProfile();
                                else if (currentPage === 'hub') renderHub();
                            } catch (e) {}
                        }
                    });

                    cloudStorage.getItem(STORAGE_KEYS.TRAINING_NOTES, (error, value) => {
                        if (!error && value) {
                            try {
                                appData.trainingNotes = JSON.parse(value);
                                if (currentPage === 'schedule') renderSchedule();
                            } catch (e) {}
                        }
                    });

                    cloudStorage.getItem(STORAGE_KEYS.SELECTED_GROUPS, (error, value) => {
                        if (!error && value) {
                            try {
                                appData.selectedGroups = JSON.parse(value);
                                if (currentPage === 'schedule') renderSchedule();
                                else if (currentPage === 'hub') renderHub();
                            } catch (e) {}
                        }
                    });

                    cloudStorage.getItem(STORAGE_KEYS.WEATHER, (error, value) => {
                        if (!error && value) {
                            try {
                                appData.weather = JSON.parse(value);
                                if (currentPage === 'hub') renderHub();
                            } catch (e) {}
                        }
                    });
                } else {
                    const savedCancelled = localStorage.getItem(STORAGE_KEYS.CANCELLED_TRAININGS);
                    if (savedCancelled) appData.cancelledTrainings = JSON.parse(savedCancelled);
                    
                    const savedProfile = localStorage.getItem(STORAGE_KEYS.PROFILE);
                    if (savedProfile) appData.profile = JSON.parse(savedProfile);
                    
                    const savedGroup = localStorage.getItem(STORAGE_KEYS.USER_GROUP);
                    if (savedGroup) appData.userGroup = savedGroup;
                    
                    const savedNotif = localStorage.getItem(STORAGE_KEYS.NOTIFICATIONS);
                    if (savedNotif) appData.notifications = JSON.parse(savedNotif);

                    const savedNotes = localStorage.getItem(STORAGE_KEYS.TRAINING_NOTES);
                    if (savedNotes) appData.trainingNotes = JSON.parse(savedNotes);

                    const savedSelectedGroups = localStorage.getItem(STORAGE_KEYS.SELECTED_GROUPS);
                    if (savedSelectedGroups) appData.selectedGroups = JSON.parse(savedSelectedGroups);

                    const savedWeather = localStorage.getItem(STORAGE_KEYS.WEATHER);
                    if (savedWeather) appData.weather = JSON.parse(savedWeather);
                }

                // Обновляем погоду
                updateWeather();
            } catch (e) {
                console.error('Ошибка загрузки:', e);
            }
        }

        // Сохранение данных
        function saveData() {
            try {
                if (cloudStorage) {
                    cloudStorage.setItem(STORAGE_KEYS.CANCELLED_TRAININGS, JSON.stringify(appData.cancelledTrainings), () => {});
                    cloudStorage.setItem(STORAGE_KEYS.PROFILE, JSON.stringify(appData.profile), () => {});
                    cloudStorage.setItem(STORAGE_KEYS.USER_GROUP, appData.userGroup, () => {});
                    cloudStorage.setItem(STORAGE_KEYS.NOTIFICATIONS, JSON.stringify(appData.notifications), () => {});
                    cloudStorage.setItem(STORAGE_KEYS.TRAINING_NOTES, JSON.stringify(appData.trainingNotes), () => {});
                    cloudStorage.setItem(STORAGE_KEYS.SELECTED_GROUPS, JSON.stringify(appData.selectedGroups), () => {});
                    cloudStorage.setItem(STORAGE_KEYS.WEATHER, JSON.stringify(appData.weather), () => {});
                } else {
                    localStorage.setItem(STORAGE_KEYS.CANCELLED_TRAININGS, JSON.stringify(appData.cancelledTrainings));
                    localStorage.setItem(STORAGE_KEYS.PROFILE, JSON.stringify(appData.profile));
                    localStorage.setItem(STORAGE_KEYS.USER_GROUP, appData.userGroup);
                    localStorage.setItem(STORAGE_KEYS.NOTIFICATIONS, JSON.stringify(appData.notifications));
                    localStorage.setItem(STORAGE_KEYS.TRAINING_NOTES, JSON.stringify(appData.trainingNotes));
                    localStorage.setItem(STORAGE_KEYS.SELECTED_GROUPS, JSON.stringify(appData.selectedGroups));
                    localStorage.setItem(STORAGE_KEYS.WEATHER, JSON.stringify(appData.weather));
                }
            } catch (e) {
                console.error('Ошибка сохранения:', e);
            }
        }

        // Получение реальной погоды для Калининграда
        function updateWeather() {
            fetch('https://api.open-meteo.com/v1/forecast?latitude=54.71&longitude=20.51&current_weather=true&hourly=temperature_2m,relativehumidity_2m,windspeed_10m&timezone=auto')
                .then(response => response.json())
                .then(data => {
                    if (data.current_weather) {
                        const weatherCodes = {
                            0: { desc: 'Ясно', icon: '☀️' },
                            1: { desc: 'Ясно', icon: '☀️' },
                            2: { desc: 'Переменная облачность', icon: '⛅' },
                            3: { desc: 'Облачно', icon: '☁️' },
                            45: { desc: 'Туман', icon: '🌫️' },
                            48: { desc: 'Туман', icon: '🌫️' },
                            51: { desc: 'Морось', icon: '🌧️' },
                            61: { desc: 'Дождь', icon: '🌧️' },
                            71: { desc: 'Снег', icon: '🌨️' },
                            95: { desc: 'Гроза', icon: '⛈️' }
                        };
                        
                        const weatherCode = data.current_weather.weathercode;
                        const weatherInfo = weatherCodes[weatherCode] || { desc: 'Облачно', icon: '☁️' };
                        
                        appData.weather = {
                            temp: Math.round(data.current_weather.temperature),
                            feels_like: Math.round(data.current_weather.temperature - 2),
                            humidity: data.hourly.relativehumidity_2m[0] || 75,
                            wind: Math.round(data.current_weather.windspeed),
                            description: weatherInfo.desc,
                            icon: weatherInfo.icon,
                            city: 'Калининград',
                            lastUpdate: new Date().toISOString()
                        };
                        
                        saveData();
                        if (currentPage === 'hub') renderHub();
                    }
                })
                .catch(error => {
                    console.log('Ошибка получения погоды:', error);
                    appData.weather = {
                        temp: 5,
                        feels_like: 2,
                        humidity: 85,
                        wind: 6,
                        description: 'Облачно',
                        icon: '☁️',
                        city: 'Калининград',
                        lastUpdate: new Date().toISOString()
                    };
                    if (currentPage === 'hub') renderHub();
                });
        }

        // Получение тренировок для даты
        function getTrainingsForDate(dateStr) {
            const date = new Date(dateStr);
            const dayOfWeek = date.getDay();
            const weeklyTrainings = WEEKLY_SCHEDULE[dayOfWeek] || [];
            const cancelledForDate = appData.cancelledTrainings[dateStr] || [];
            
            return weeklyTrainings.map(training => {
                const trainingKey = `${training.time} ${training.name}`;
                const fullKey = `${dateStr}_${trainingKey}`;
                return {
                    ...training,
                    isCancelled: cancelledForDate.includes(trainingKey),
                    hasNote: appData.trainingNotes && appData.trainingNotes[fullKey] && appData.trainingNotes[fullKey].trim() !== ''
                };
            });
        }

        // Проверка, попадает ли тренировка под фильтр
        function isTrainingVisible(training) {
            if (!appData.selectedGroups || appData.selectedGroups.length === 0) {
                return true;
            }
            return appData.selectedGroups.some(group => training.name.includes(group));
        }

        // Форматирование даты
        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}.${m}`;
        }

        // Показать уведомление
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // Получить приветствие
        function getGreeting() {
            const hour = new Date().getHours();
            if (hour < 6) return 'Доброй ночи';
            if (hour < 12) return 'Доброе утро';
            if (hour < 18) return 'Добрый день';
            return 'Добрый вечер';
        }

        // Получить следующую тренировку (с учетом фильтра групп)
        function getNextTraining() {
            const today = new Date().toISOString().split('T')[0];
            const trainings = getTrainingsForDate(today);
            const now = new Date();
            const currentTime = now.getHours() * 60 + now.getMinutes();
            
            const futureTrainings = trainings
                .filter(t => !t.isCancelled && isTrainingVisible(t))
                .map(t => {
                    const [hours, minutes] = t.time.split(':').map(Number);
                    const timeInMinutes = hours * 60 + minutes;
                    return { ...t, timeInMinutes };
                })
                .filter(t => t.timeInMinutes > currentTime)
                .sort((a, b) => a.timeInMinutes - b.timeInMinutes);
            
            return futureTrainings[0] || null;
        }

        // Получить прогресс целей
        function getGoalsProgress() {
            if (!appData.profile.goals || appData.profile.goals.length === 0) {
                return { count: 0, avg: 0 };
            }
            const avg = appData.profile.goals.reduce((sum, g) => sum + g.progress, 0) / appData.profile.goals.length;
            return { count: appData.profile.goals.length, avg: Math.round(avg) };
        }

        // Навигация по виджетам
        window.navigateTo = function(page, section) {
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            document.querySelector(`[data-page="${page}"]`).classList.add('active');
            currentPage = page;
            
            if (page === 'schedule') {
                renderSchedule();
            } else if (page === 'profile') {
                renderProfile();
                setTimeout(() => {
                    if (section) {
                        const element = document.getElementById(section);
                        if (element) {
                            element.scrollIntoView({ behavior: 'smooth' });
                        }
                    }
                }, 100);
            } else if (page === 'hub') {
                renderHub();
            }
        };

        // Рендер хаба
        function renderHub() {
            const content = document.getElementById('content');
            if (!content) return;
            
            const greeting = getGreeting();
            const nextTraining = getNextTraining();
            const goalsProgress = getGoalsProgress();
            
            // Статистика тренировок за месяц
            const today = new Date();
            const monthStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
            let monthTrainings = 0;
            for (let i = 1; i <= 31; i++) {
                const dateStr = `${monthStr}-${String(i).padStart(2, '0')}`;
                const trainings = getTrainingsForDate(dateStr);
                monthTrainings += trainings.filter(t => !t.isCancelled && isTrainingVisible(t)).length;
            }
            
            content.innerHTML = `
                <!-- Приветствие -->
                <div class="hub-greeting">
                    <div class="hub-avatar">${tgUser.charAt(0).toUpperCase()}</div>
                    <div class="hub-greeting-text">
                        <h2>${greeting}, ${tgUser}!</h2>
                        <p>${new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' })}</p>
                    </div>
                </div>
                
                <!-- Сетка виджетов -->
                <div class="hub-grid">
                    <!-- Следующая тренировка -->
                    <div class="hub-widget" onclick="navigateTo('schedule')">

                            <div class="hub-widget-icon">💃</div>
                            <div class="hub-widget-title">Следующая</div>
                        </div>
                        <div class="hub-widget-content">
                            ${nextTraining ? nextTraining.time : '—'}
                        </div>
                        <div class="hub-widget-sub">
                            ${nextTraining ? nextTraining.name : 'Нет тренировок'}
                        </div>
                    </div>
                    
                    <!-- Уведомления -->
                    <div class="hub-widget" onclick="navigateTo('profile', 'notifications')">
                        <div class="hub-widget-header">
                            <div class="hub-widget-icon">🔔</div>
                            <div class="hub-widget-title">Уведомления</div>
                        </div>
                        <div class="hub-widget-content">
                            ${appData.notifications.length}
                        </div>
                        <div class="hub-widget-sub">
                            активных
                        </div>
                    </div>
                    
                    <!-- Мои цели -->
                    <div class="hub-widget" onclick="navigateTo('profile', 'goals')">
                        <div class="hub-widget-header">
                            <div class="hub-widget-icon">🎯</div>
                            <div class="hub-widget-title">Цели</div>
                        </div>
                        <div class="hub-widget-content">
                            ${goalsProgress.count}
                        </div>
                        <div class="hub-widget-sub">
                            средний прогресс ${goalsProgress.avg}%
                        </div>
                    </div>
                    
                    <!-- Тренировок в месяце -->
                    <div class="hub-widget" onclick="navigateTo('schedule')">
                        <div class="hub-widget-header">
                            <div class="hub-widget-icon">📅</div>
                            <div class="hub-widget-title">В этом месяце</div>
                        </div>
                        <div class="hub-widget-content">
                            ${monthTrainings}
                        </div>
                        <div class="hub-widget-sub">
                            тренировок
                        </div>
                    </div>
                </div>
                
                <!-- Погода (Калининград) -->
                <div class="weather-widget" onclick="window.open('https://yandex.ru/pogoda/kaliningrad', '_blank')">
                    <div class="weather-left">
                        <div class="weather-icon">${appData.weather.icon}</div>
                        <div>
                            <div class="weather-temp">Погода</div>
                            <div class="weather-city">${appData.weather.city}</div>
                        </div>
                    </div>
                </div>
                
                <!-- Быстрая статистика -->
                <div class="quick-stats">
                    <div class="quick-stat">
                        <div class="quick-stat-value">${appData.profile.goals.length || 0}</div>
                        <div class="quick-stat-label">целей</div>
                    </div>
                    <div class="quick-stat">
                        <div class="quick-stat-value">${appData.notifications.length}/5</div>
                        <div class="quick-stat-label">напоминаний</div>
                    </div>
                    <div class="quick-stat">
                        <div class="quick-stat-value">${appData.userGroup ? '✅' : '❌'}</div>
                        <div class="quick-stat-label">группа</div>
                    </div>
                </div>
            `;
        }

        // Открыть модальное окно выбора группы
        window.openGroupSelector = function(rowIndex) {
            activeFilterRow = rowIndex;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.setAttribute('onclick', 'closeModalIfOutside(event)');
            
            let groupsHtml = '';
            ALL_GROUPS.forEach(group => {
                const isSelected = appData.selectedGroups[rowIndex] === group;
                const isDisabled = !isSelected && appData.selectedGroups.length >= 2 && appData.selectedGroups[rowIndex] === undefined;
                
                groupsHtml += `
                    <div class="group-item ${isSelected ? 'selected' : ''} ${isDisabled ? 'disabled' : ''}" 
                         onclick="${!isDisabled || isSelected ? `selectGroup('${group.replace(/'/g, "\\'")}')` : ''}">
                        ${group}
                    </div>
                `;
            });
            
            modal.innerHTML = `
                <div class="group-select-modal" onclick="event.stopPropagation()">
                    <div class="modal-title">Выберите группу</div>
                    <div class="groups-list">
                        ${groupsHtml}
                    </div>
                    <button class="modal-close-btn" onclick="closeModal()">Отмена</button>
                </div>
            `;
            document.body.appendChild(modal);
        };

        // Выбрать группу
        window.selectGroup = function(group) {
            if (activeFilterRow !== null) {
                if (!appData.selectedGroups) {
                    appData.selectedGroups = [];
                }
                
                const existingIndex = appData.selectedGroups.indexOf(group);
                if (existingIndex !== -1 && existingIndex !== activeFilterRow) {
                    appData.selectedGroups[existingIndex] = undefined;
                }
                
                appData.selectedGroups[activeFilterRow] = group;
                appData.selectedGroups = appData.selectedGroups.filter(g => g !== undefined);
                
                saveData();
                closeModal();
                renderSchedule();
                renderHub();
                if (currentPage === 'hub') renderHub();
                showToast(`Выбрана группа: ${group}`);
            }
        };

        // Удалить группу из фильтра
        window.removeGroup = function(rowIndex, event) {
            event.stopPropagation();
            
            if (appData.selectedGroups && appData.selectedGroups[rowIndex]) {
                const removedGroup = appData.selectedGroups[rowIndex];
                appData.selectedGroups.splice(rowIndex, 1);
                saveData();
                renderSchedule();
                renderHub();
                if (currentPage === 'hub') renderHub();
                showToast(`Группа ${removedGroup} убрана из фильтра`);
            }
        };

        // Очистить все фильтры
        window.clearAllFilters = function() {
            appData.selectedGroups = [];
            saveData();
            renderSchedule();
            renderHub();
            showToast('Все фильтры сброшены');
        };

        // Открыть модальное окно для заметки
        function openNoteModal(date, time, name, currentNote) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.setAttribute('onclick', 'closeModalIfOutside(event)');
            modal.innerHTML = `
                <div class="goal-modal-content" onclick="event.stopPropagation()">
                    <div class="goal-modal-title">Заметка</div>
                    <div style="text-align: center; margin-bottom: 8px; color: var(--text-secondary);">
                        ${time} • ${name}
                    </div>
                    <textarea class="note-textarea" id="trainingNote" placeholder="Ваши заметки к тренировке...">${(currentNote || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
                    <div class="goal-buttons">
                        <button class="goal-btn goal-btn-secondary" onclick="closeModal()">Отмена</button>
                        <button class="goal-btn goal-btn-primary" onclick="saveNote('${date}', '${time}', '${name.replace(/'/g, "\\'")}')">Сохранить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('trainingNote')?.focus();
        }

        // Сохранить заметку
        window.saveNote = function(date, time, name) {
            const noteInput = document.getElementById('trainingNote');
            if (!noteInput) return;
            
            const fullKey = `${date}_${time} ${name}`;
            const noteText = noteInput.value.trim();
            
            if (noteText === '') {
                delete appData.trainingNotes[fullKey];
            } else {
                appData.trainingNotes[fullKey] = noteText;
            }
            
            saveData();
            closeModal();
            renderSchedule();
            showToast(noteText === '' ? 'Заметка удалена' : 'Заметка сохранена');
        };

        // Рендер расписания
        function renderSchedule() {
            const content = document.getElementById('content');
            if (!content) return;
            
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startDay = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
            
            const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
            const weekdays = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ', 'ВС'];
            
            let filterHtml = `
                <div class="filter-compact">
                    <div class="filter-header">
                        <div class="filter-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="22 3 2 3 10 13 10 21 14 18 14 13 22 3" />
                            </svg>
                            Мои группы
                        </div>
                        <div>
                            ${appData.selectedGroups && appData.selectedGroups.length > 0 ? 
                                `<span class="filter-clear" onclick="clearAllFilters()">Сбросить ✕</span>` : 
                                `<span class="filter-badge">0/2</span>`}
                        </div>
                    </div>
                    <div class="filter-rows">
                        <div class="filter-row ${appData.selectedGroups && appData.selectedGroups[0] ? 'active' : ''}" onclick="openGroupSelector(0)">
                            <span class="row-icon">①</span>
                            <span class="row-label">Группа 1</span>
                            <span class="row-group ${!appData.selectedGroups || !appData.selectedGroups[0] ? 'empty' : ''}">${appData.selectedGroups && appData.selectedGroups[0] ? appData.selectedGroups[0] : 'не выбрана'}</span>
                            ${appData.selectedGroups && appData.selectedGroups[0] ? `<span class="row-remove" onclick="removeGroup(0, event)">✕</span>` : ''}
                        </div>
                        <div class="filter-row ${appData.selectedGroups && appData.selectedGroups[1] ? 'active' : ''}" onclick="openGroupSelector(1)">
                            <span class="row-icon">②</span>
                            <span class="row-label">Группа 2</span>
                            <span class="row-group ${!appData.selectedGroups || !appData.selectedGroups[1] ? 'empty' : ''}">${appData.selectedGroups && appData.selectedGroups[1] ? appData.selectedGroups[1] : 'не выбрана'}</span>
                            ${appData.selectedGroups && appData.selectedGroups[1] ? `<span class="row-remove" onclick="removeGroup(1, event)">✕</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
            
            let html = filterHtml;
            
            html += `
                <div class="calendar-wrapper">
                    <div class="calendar-header">
                        <button class="calendar-nav-btn" onclick="changeMonth(-1)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6" /></svg>
                        </button>
                        <h3>${months[month]} ${year}</h3>
                        <button class="calendar-nav-btn" onclick="changeMonth(1)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6" /></svg>
                        </button>
                    </div>
                    <div class="weekdays">${weekdays.map(d => `<div class="weekday">${d}</div>`).join('')}</div>
                    <div class="calendar-grid">
            `;
            
            for (let i = 0; i < startDay; i++) html += '<div class="calendar-day other-month"></div>';
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const trainings = getTrainingsForDate(dateStr);
                
                const visibleTrainings = trainings.filter(t => !t.isCancelled && isTrainingVisible(t));
                const hasVisibleTraining = visibleTrainings.length > 0;
                const isSelected = selectedDate === dateStr;
                
                html += `
                    <div class="calendar-day ${hasVisibleTraining ? 'has-training' : ''} ${isSelected ? 'selected' : ''}" onclick="selectDate('${dateStr}')">
                        ${i}
                        ${visibleTrainings.length > 0 ? `<span class="training-count">${visibleTrainings.length}</span>` : ''}
                    </div>
                `;
            }
            
            html += '</div></div>';
            
            if (isAdmin) {
                html += `
                    <div class="admin-mode-banner" style="background: rgba(255,75,75,0.1); border: 1px dashed var(--cancel-color); border-radius: 12px; padding: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--cancel-color);">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="12" y1="8" x2="12" y2="12" />
                            <line x1="12" y1="16" x2="12.01" y2="16" />

            html += '<div class="trainings-container">';
            html += `<div class="trainings-title">📅 Тренировки <span>${formatDate(selectedDate)}</span></div>`;
            
            const trainings = getTrainingsForDate(selectedDate);
            const visibleTrainings = trainings.filter(t => isTrainingVisible(t));
            
            if (visibleTrainings.length > 0) {
                visibleTrainings.forEach(t => {
                    const isCancelled = t.isCancelled;
                    const hasNote = t.hasNote;
                    const cancelledClass = isCancelled ? 'cancelled' : '';
                    const noteClass = hasNote ? 'has-note' : '';
                    const adminClass = isAdmin ? 'admin-mode' : '';
                    
                    const clickHandler = isAdmin 
                        ? `toggleCancelTraining('${selectedDate}', '${t.time}', '${t.name.replace(/'/g, "\\'")}')`
                        : `openNoteModal('${selectedDate}', '${t.time}', '${t.name.replace(/'/g, "\\'")}', '${(appData.trainingNotes[`${selectedDate}_${t.time} ${t.name}`] || '').replace(/'/g, "\\'")}')`;

                            <span class="training-time">${t.time}</span>
                            <span class="training-name">${t.name}</span>
                            ${hasNote ? '<span class="note-indicator">📝</span>' : ''}
                            ${isAdmin ? '<span class="training-cancel-btn" style="width:32px;height:32px;border-radius:16px;background:var(--cancel-color);display:flex;align-items:center;justify-content:center;color:white;">✕</span>' : ''}

            } else {

                    html += '<div class="no-trainings" style="padding:24px;text-align:center;background:rgba(255,255,255,0.02);border-radius:14px;color:var(--text-muted);">Нет занятий для выбранных групп</div>';

            }
            html += '</div>';
            
            content.innerHTML = html;
        }

                    <div class="goals-title" style="font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px;">Мои цели</div>
                    ${goalsHtml}
                    <div class="add-goal-btn" onclick="openAddGoalModal()" style="width:100%;padding:16px;background:rgba(255,255,255,0.02);border:1px dashed var(--glass-border);border-radius:16px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;margin-top:8px;">+ Добавить цель</div>
                </div>
                
                <div class="soon-banner">
                    <div style="width:56px;height:56px;border-radius:28px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:28px;">⚖️</div>
                    <div style="flex:1;">
                        <div style="font-size:18px;font-weight:600;color:var(--text-primary);margin-bottom:4px;">Трекер веса</div>
                        <div style="font-size:13px;color:var(--text-muted);">Скоро появится</div>
                    </div>
                </div>
            `;
        }

        // Обработчики для расписания
        window.changeMonth = function(delta) {
            currentMonth.setMonth(currentMonth.getMonth() + delta);
            renderSchedule();
        };

        window.selectDate = function(date) {
            selectedDate = date;
            renderSchedule();
        };

        window.toggleCancelTraining = function(date, time, name) {
            if (!isAdmin) return;
            
            const trainingKey = `${time} ${name}`;
            
            if (!appData.cancelledTrainings[date]) {
                appData.cancelledTrainings[date] = [];
            }
            
            const index = appData.cancelledTrainings[date].indexOf(trainingKey);
            
            if (index === -1) {
                appData.cancelledTrainings[date].push(trainingKey);
                showToast('❌ Тренировка отменена для всех');
            } else {
                appData.cancelledTrainings[date].splice(index, 1);
                showToast('✅ Тренировка восстановлена для всех');
            }
            
            if (appData.cancelledTrainings[date].length === 0) {
                delete appData.cancelledTrainings[date];
            }
            
            saveData();
            renderSchedule();
        };

        // Обработчики для профиля
        window.selectUserGroup = function() {
            const select = document.getElementById('userGroupSelect');
            if (select) {
                appData.userGroup = select.value;
                saveData();
                if (currentPage === 'hub') renderHub();
                showToast('Группа сохранена');
            }
        };

        window.addNotification = function() {
            if (!appData.userGroup) {
                showToast('Сначала выберите группу');
                return;
            }
            
            if (appData.notifications.length >= 5) {
                showToast('Максимум 5 уведомлений');
                return;
            }
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.setAttribute('onclick', 'closeModalIfOutside(event)');
            modal.innerHTML = `
                <div class="goal-modal-content" onclick="event.stopPropagation()">
                    <div class="goal-modal-title">Новое напоминание</div>
                    <input type="time" class="goal-input" id="notifTime" value="18:00">
                    <div class="goal-buttons">
                        <button class="goal-btn goal-btn-secondary" onclick="closeModal()">Отмена</button>
                        <button class="goal-btn goal-btn-primary" onclick="saveNotification()">Сохранить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.saveNotification = function() {
            const timeInput = document.getElementById('notifTime');
            if (!timeInput?.value) return;
            
            const exists = appData.notifications.some(n => n.time === timeInput.value);
            if (exists) {
                showToast('Такое время уже есть');
                closeModal();
                return;
            }
            
            appData.notifications.push({
                id: Date.now(),
                time: timeInput.value,
                group: appData.userGroup,
                enabled: true
            });
            
            saveData();
            closeModal();
            renderProfile();
            if (currentPage === 'hub') renderHub();
            showToast('Напоминание добавлено');
        };

        window.deleteNotification = function(id) {
            appData.notifications = appData.notifications.filter(n => n.id !== id);
            saveData();
            renderProfile();
            if (currentPage === 'hub') renderHub();
            showToast('Напоминание удалено');
        };

        window.openAddGoalModal = function() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.setAttribute('onclick', 'closeModalIfOutside(event)');
            modal.innerHTML = `
                <div class="goal-modal-content" onclick="event.stopPropagation()">
                    <div class="goal-modal-title">Новая цель</div>
                    <input type="text" class="goal-input" id="goalText" placeholder="Например: Похудеть на 5 кг" autofocus>
                    <div class="goal-buttons">
                        <button class="goal-btn goal-btn-secondary" onclick="closeModal()">Отмена</button>
                        <button class="goal-btn goal-btn-primary" onclick="saveGoal()">Добавить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('goalText')?.focus();
        };

        window.saveGoal = function() {
            const input = document.getElementById('goalText');
            if (input?.value.trim()) {
                appData.profile.goals.push({
                    text: input.value.trim(),
                    progress: 0
                });
                saveData();
                closeModal();
                renderProfile();
                if (currentPage === 'hub') renderHub();
                showToast('Цель добавлена');
            }
        };

        window.editGoalProgress = function(index) {
            const goal = appData.profile.goals[index];
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.setAttribute('onclick', 'closeModalIfOutside(event)');
            modal.innerHTML = `
                <div class="goal-modal-content" onclick="event.stopPropagation()">
                    <div class="goal-modal-title">Прогресс</div>
                    <div style="text-align:center; margin-bottom:16px; color:var(--text-secondary);">${goal.text}</div>
                    <input type="number" class="goal-input" id="goalProgress" value="${goal.progress}" min="0" max="100" autofocus>
                    <div class="goal-buttons">
                        <button class="goal-btn goal-btn-secondary" onclick="closeModal()">Отмена</button>
                        <button class="goal-btn goal-btn-primary" onclick="updateGoalProgress(${index})">Сохранить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('goalProgress')?.focus();
        };

        window.updateGoalProgress = function(index) {
            const input = document.getElementById('goalProgress');
            const progress = parseInt(input?.value);
            
            if (!isNaN(progress) && progress >= 0 && progress <= 100) {
                appData.profile.goals[index].progress = progress;
                saveData();
                closeModal();
                renderProfile();
                if (currentPage === 'hub') renderHub();
                
                if (progress === 100) {
                    showToast('🎉 Поздравляем с достижением цели!');
                }
            }
        };

        window.deleteGoal = function(index) {
            if (confirm('Удалить цель?')) {
                appData.profile.goals.splice(index, 1);
                saveData();
                renderProfile();
                if (currentPage === 'hub') renderHub();
                showToast('Цель удалена');
            }
        };

        // Админ панель
        function initAdminTrigger() {
            const trigger = document.getElementById('adminTrigger');
            trigger.addEventListener('click', () => {
                if (!isAdmin) {
                    document.getElementById('adminLoginModal').classList.add('active');
                    document.getElementById('adminOverlay').classList.add('active');
                } else {
                    document.getElementById('adminPanel').classList.add('active');
                    document.getElementById('adminOverlay').classList.add('active');
                }
            });
        }

        function updateAdminBadge() {
            const badge = document.getElementById('adminBadge');
            badge.classList.toggle('active', isAdmin);
        }

        window.closeAdminLogin = function() {
            document.getElementById('adminLoginModal').classList.remove('active');
            document.getElementById('adminOverlay').classList.remove('active');
        };

        window.closeAdminPanel = function() {
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('adminOverlay').classList.remove('active');
        };

        window.checkAdminPassword = function() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'admin123') {
                isAdmin = true;
                closeAdminLogin();
                updateAdminBadge();
                renderSchedule();
                setTimeout(() => {
                    document.getElementById('adminPanel').classList.add('active');
                    document.getElementById('adminOverlay').classList.add('active');
                }, 300);
                showToast('Режим администратора активирован');
            } else {
                showToast('Неверный пароль');
            }
        };

        window.logoutAdmin = function() {
            isAdmin = false;
            updateAdminBadge();
            closeAdminPanel();
            renderSchedule();
            if (currentPage === 'hub') renderHub();
            showToast('Вы вышли из админа');
        };

        // Вспомогательные функции
        window.closeModal = function() {
            document.querySelector('.modal')?.remove();
            activeFilterRow = null;
        };

        window.closeModalIfOutside = function(event) {
            if (event.target.classList.contains('modal')) {
                closeModal();
            }
        };

        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', async () => {
            await loadTheme();
            loadData();
            renderHub();
            initAdminTrigger();
            updateAdminBadge();

            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                    item.classList.add('active');
                    currentPage = item.dataset.page;
                    
                    if (currentPage === 'schedule') {
                        renderSchedule();
                    } else if (currentPage === 'profile') {
                        renderProfile();
                    } else if (currentPage === 'hub') {
                        renderHub();
                    }
                });
            });
        });

        window.openNoteModal = openNoteModal;
    </script>
</body>
</html>
