<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>РИТМ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #9d4edd;
            --primary-dark: #7b2cbf;
            --secondary: #00bbf9;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(20, 10, 30, 0.7);
            --glass-border: rgba(157, 78, 221, 0.2);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            --cancel-color: #ff4b4b;
            --admin-badge: #ff006e;
            --success: #00bbf9;
            --goal-1: #9d4edd;
            --goal-2: #00bbf9;
            --goal-3: #ff9f1c;
            --celebration: #ffd700;
            --notification: #ff9f1c;
        }

        /* Светлая тема (синий акцент) */
        .light-theme {
            --primary: #0066cc;
            --primary-dark: #0052a3;
            --secondary: #00a8e8;
            --bg-dark: #f5f7fa;
            --bg-card: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 102, 204, 0.15);
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #767676;
            --cancel-color: #dc3545;
            --admin-badge: #dc3545;
            --notification: #ff8c42;
        }

        .light-theme .app-container {
            background: linear-gradient(145deg, #ffffff 0%, #f0f5ff 100%);
        }

        .light-theme .app-header {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.8) 100%);
        }

        .light-theme .nav-bar {
            background: rgba(255, 255, 255, 0.9);
        }

        .light-theme .goal-input,
        .light-theme .group-selector,
        .light-theme .admin-input {
            background: white;
            color: #1a1a1a;
            border: 1px solid #e0e0e0;
        }

        .light-theme .calendar-nav-btn {
            background: white;
            color: #1a1a1a;
        }

        .light-theme .calendar-day {
            background: white;
            color: #1a1a1a;
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            transition: background-color 0.3s ease;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            height: 100dvh;
            background: linear-gradient(145deg, #0f0f1a 0%, #1a1025 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            margin: 0 auto;
            transition: background 0.3s ease;
        }

        .app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        .app-header {
            padding: 18px 20px 10px;
            text-align: center;
            background: linear-gradient(180deg, rgba(26, 16, 37, 0.95) 0%, rgba(26, 16, 37, 0.8) 100%);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            position: relative;
        }

        .app-header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            cursor: pointer;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            transition: all 0.2s ease;
        }

        .app-header h1:active {
            transform: scale(0.95);
        }

        .app-header p {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .admin-badge {
            position: absolute;
            top: 10px;
            right: 15px;
            background: var(--admin-badge);
            color: white;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .admin-badge.active {
            opacity: 1;
        }

        .nav-bar {
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 12px;
            background: rgba(26, 16, 37, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            gap: 5px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            padding: 8px 0;
            border-radius: 20px;
            flex: 1;
            max-width: 120px;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            transition: all 0.2s ease;
        }

        .nav-item.active svg {
            color: var(--primary);
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 18px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .content::-webkit-scrollbar {
            display: none;
        }

        /* Переключатель темы */
        .theme-toggle {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .theme-circle {
            width: 32px;
            height: 32px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .theme-circle.light {
            background: linear-gradient(135deg, #0066cc, #00a8e8);
            box-shadow: 0 2px 8px rgba(0, 102, 204, 0.3);
        }

        .theme-circle.dark {
            background: linear-gradient(135deg, #9d4edd, #00bbf9);
            box-shadow: 0 2px 8px rgba(157, 78, 221, 0.3);
        }

        .theme-circle.active {
            border-color: white;
            transform: scale(1.1);
        }

        .profile-header {
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            padding: 24px 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 600;
            color: white;
            box-shadow: 0 10px 20px rgba(157, 78, 221, 0.3);
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .profile-id {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Модальные окна */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 2000;
            padding: 16px;
            box-sizing: border-box;
        }

        .goal-modal-content {
            width: 100%;
            max-width: 360px;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 28px 24px;
            border: 2px solid var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }

        .goal-modal-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }

        .goal-input {
            width: 100%;
            padding: 18px 20px;
            margin: 12px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 16px;
            text-align: left;
            transition: all 0.3s ease;
        }

        .goal-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(157, 78, 221, 0.1);
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.3);
        }

        .goal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .goal-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 24px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .goal-btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .goal-btn-primary:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(157, 78, 221, 0.4);
        }

        .goal-btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
        }

        .goal-btn-secondary:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.95);
        }

        /* Календарь */
        .calendar-wrapper {
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 18px;
            border: 1px solid var(--glass-border);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .calendar-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .calendar-nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .calendar-nav-btn:active {
            background: var(--primary);
            color: white;
        }

        .calendar-nav-btn svg {
            width: 20px;
            height: 20px;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 8px;
            text-align: center;
        }

        .weekday {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            position: relative;
        }

        .calendar-day:active {
            background: rgba(157, 78, 221, 0.3);
        }

        .calendar-day.has-training {
            background: rgba(157, 78, 221, 0.2);
            color: var(--primary);
            font-weight: 600;
        }

        .calendar-day.selected {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .calendar-day.other-month {
            opacity: 0.2;
        }

        .training-count {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--primary);
            color: white;
            font-size: 9px;
            width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .filter-btn {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 8px 16px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .trainings-container {
            margin-top: 14px;
        }

        .trainings-title {
            font-size: 15px;
            margin-bottom: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trainings-title span {
            background: rgba(157, 78, 221, 0.2);
            padding: 4px 10px;
            border-radius: 14px;
            font-size: 12px;
            color: var(--primary);
        }

        .training-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            margin-bottom: 8px;
            border-left: 4px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .training-item:active {
            background: rgba(157, 78, 221, 0.1);
            transform: scale(0.98);
        }

        .training-item.cancelled {
            opacity: 0.5;
            border-left-color: var(--cancel-color);
            text-decoration: line-through;
            background: rgba(255, 75, 75, 0.1);
        }

        .training-time {
            background: rgba(157, 78, 221, 0.2);
            padding: 5px 10px;
            border-radius: 18px;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
        }

        .training-name {
            flex: 1;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .training-note-indicator {
            width: 8px;
            height: 8px;
            border-radius: 4px;
            background: var(--primary);
            margin-left: 4px;
        }

        .no-trainings {
            padding: 24px;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Секции профиля */
        .group-section, .nutrition-section, .mood-section {
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }

        .group-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .group-selector {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            color: var(--text-primary);
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .selected-groups {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .group-tag {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .group-tag button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
        }

        /* График питания */
        .nutrition-summary {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .nutrition-total {
            text-align: center;
        }

        .nutrition-total .value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }

        .nutrition-total .label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .nutrition-progress {
            flex: 1;
        }

        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .nutrition-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .nutrition-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
        }

        .nutrition-emoji {
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(157, 78, 221, 0.1);
            border-radius: 20px;
        }

        .nutrition-info {
            flex: 1;
        }

        .nutrition-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .nutrition-calories {
            font-size: 12px;
            color: var(--text-muted);
        }

        .nutrition-delete {
            width: 32px;
            height: 32px;
            border-radius: 16px;
            background: rgba(255, 75, 75, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--cancel-color);
            cursor: pointer;
        }

        .add-nutrition-btn {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed var(--glass-border);
            border-radius: 16px;
            color: var(--text-muted);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        /* График настроения */
        .mood-selector {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .mood-btn {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mood-btn.selected {
            border-color: var(--primary);
            transform: scale(1.1);
            background: rgba(157, 78, 221, 0.1);
        }

        .mood-history {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mood-day {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
        }

        .mood-date {
            font-size: 13px;
            color: var(--text-muted);
            min-width: 60px;
        }

        .mood-emoji {
            font-size: 20px;
        }

        .mood-impact {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            background: rgba(0, 255, 0, 0.1);
            color: #00ff00;
        }

        .mood-impact.negative {
            background: rgba(255, 0, 0, 0.1);
            color: #ff4b4b;
        }

        .admin-panel {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            max-width: 420px;
            right: 0;
            margin: 0 auto;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            padding: 28px 20px 30px;
            z-index: 3500;
            transition: bottom 0.3s ease;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.5);
            border-top: 2px solid var(--primary);
            max-height: 85vh;
            overflow-y: auto;
        }

        .admin-panel.active {
            bottom: 0;
        }

        .admin-panel h3 {
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .feedback-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            margin-bottom: 8px;
            border-left: 4px solid var(--primary);
        }

        .feedback-date {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .feedback-text {
            font-size: 14px;
            color: var(--text-primary);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 4000;
            box-shadow: 0 5px 20px rgba(157, 78, 221, 0.4);
            animation: slideUp 0.3s ease;
            max-width: calc(100% - 32px);
            text-align: center;
        }

        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="app" id="mainApp">
            <header class="app-header">
                <h1 id="adminTrigger">РИТМ</h1>
                <p>ver 1.5</p>
                <div class="admin-badge" id="adminBadge">ADMIN</div>
            </header>

            <nav class="nav-bar" id="navigation">
                <div class="nav-item active" data-page="schedule">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    <span>Расписание</span>
                </div>
                <div class="nav-item" data-page="profile">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    <span>Профиль</span>
                </div>
            </nav>

            <div class="content" id="content"></div>
        </div>

        <div class="admin-overlay" id="adminOverlay"></div>

        <div class="admin-modal" id="adminLoginModal">
            <h3 class="goal-modal-title">Вход администратора</h3>
            <input type="password" class="goal-input" id="adminPassword" placeholder="Пароль" />
            <div class="goal-buttons">
                <button class="goal-btn goal-btn-secondary" onclick="closeAdminLogin()">Отмена</button>
                <button class="goal-btn goal-btn-primary" onclick="checkAdminPassword()">Войти</button>
            </div>
        </div>

        <div class="admin-panel" id="adminPanel">
            <div class="admin-handle"></div>
            <h3>Управление</h3>
            <div class="admin-tip">
                <span>✕</span>
                <span>Нажмите на тренировку в расписании чтобы отменить или восстановить (для всех пользователей)</span>
            </div>
            
            <h4 style="margin-top: 20px; color: var(--text-primary);">Отзывы о тренировках</h4>
            <div id="adminFeedbackList"></div>
            
            <button class="goal-btn goal-btn-secondary" onclick="closeAdminPanel()" style="margin-top: 20px;">Закрыть</button>
            <button class="goal-btn goal-btn-secondary" onclick="logoutAdmin()" style="margin-top: 10px;">Выйти из админа</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>
        // Константы
        const STORAGE_KEYS = {
            CANCELLED_TRAININGS: 'ritm_cancelled_trainings',
            PROFILE: 'ritm_profile',
            USER_GROUPS: 'ritm_user_groups',
            NOTIFICATIONS: 'ritm_notifications',
            TRAINING_NOTES: 'ritm_training_notes',
            TRAINING_FEEDBACK: 'ritm_training_feedback',
            NUTRITION: 'ritm_nutrition',
            MOOD: 'ritm_mood',
            THEME: 'ritm_theme'
        };

        // Расписание
        const WEEKLY_SCHEDULE = {
            1: [ // Понедельник
                { time: '17:15', name: 'Ритмика (3-5 лет)' },
                { time: '18:00', name: 'Калланетика' },
                { time: '19:00', name: 'Латина (старшая)' },
                { time: '20:00', name: 'Латина (новички)' }
            ],
            2: [ // Вторник
                { time: '18:00', name: 'Бальные танцы (5-6 лет)' },
                { time: '19:00', name: 'Бальные танцы (7-9 лет)' }
            ],
            3: [ // Среда
                { time: '18:00', name: 'Бальные танцы' },
                { time: '19:00', name: 'Латина (старшая)' },
                { time: '20:00', name: 'Индивидуальные' }
            ],
            4: [ // Четверг
                { time: '18:00', name: 'Бальные танцы (5-6 лет)' },
                { time: '19:00', name: 'Бальные танцы (9-12 лет)' },
                { time: '20:00', name: 'Бачата (новички)' }
            ],
            5: [ // Пятница
                { time: '17:15', name: 'Ритмика (3-5 лет)' },
                { time: '18:00', name: 'Бальные танцы' },
                { time: '19:00', name: 'Индивидуальные' }
            ],
            6: [ // Суббота
                { time: '9:00', name: 'Калланетика' },
                { time: '10:00', name: 'Бачата + Латина' },
                { time: '11:00', name: 'Бальные танцы (9-12 лет)' },
                { time: '12:00', name: 'Индивидуальные' }
            ],
            0: [] // Воскресенье
        };

        // Группы
        const ALL_GROUPS = [
            'Ритмика (3-5 лет)',
            'Бальные танцы (5-6 лет)',
            'Бальные танцы (7-9 лет)',
            'Бальные танцы (9-12 лет)',
            'Латина (новички)',
            'Латина (старшая)',
            'Калланетика',
            'Бачата (новички)',
            'Индивидуальные'
        ];

        // Эмодзи для питания
        const FOOD_EMOJIS = ['🍎', '🍗', '🥗', '🍚', '🥛', '🍌', '🥩', '🍳', '🥑', '🍞'];

        // Эмодзи для настроения
        const MOOD_EMOJIS = ['😢', '😕', '😐', '🙂', '🤩'];

        // Данные приложения
        let appData = {
            cancelledTrainings: {},
            profile: { goals: [] },
            userGroups: [],
            notifications: [],
            trainingNotes: {},
            trainingFeedback: [],
            nutrition: [],
            mood: [],
            theme: 'dark'
        };
        
        let currentPage = 'schedule';
        let selectedDate = new Date().toISOString().split('T')[0];
        let currentMonth = new Date();
        let isAdmin = false;
        let tg = null;
        let cloudStorage = null;
        let tgUser = 'Танцор';
        let filterEnabled = false;

        // Инициализация Telegram
        try {
            if (window.Telegram && Telegram.WebApp) {
                tg = Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    tgUser = user.first_name || user.username || 'Танцор';
                }
                
                cloudStorage = tg.CloudStorage;
            }
        } catch (e) {}

        // Загрузка данных
        function loadData() {
            try {
                if (cloudStorage) {
                    cloudStorage.getItem(STORAGE_KEYS.CANCELLED_TRAININGS, (e, v) => { if (!e && v) appData.cancelledTrainings = JSON.parse(v); });
                    cloudStorage.getItem(STORAGE_KEYS.PROFILE, (e, v) => { if (!e && v) appData.profile = JSON.parse(v); });
                    cloudStorage.getItem(STORAGE_KEYS.USER_GROUPS, (e, v) => { if (!e && v) appData.userGroups = JSON.parse(v); });
                    cloudStorage.getItem(STORAGE_KEYS.TRAINING_NOTES, (e, v) => { if (!e && v) appData.trainingNotes = JSON.parse(v); });
                    cloudStorage.getItem(STORAGE_KEYS.TRAINING_FEEDBACK, (e, v) => { if (!e && v) appData.trainingFeedback = JSON.parse(v); });
                    cloudStorage.getItem(STORAGE_KEYS.NUTRITION, (e, v) => { if (!e && v) appData.nutrition = JSON.parse(v); });
                    cloudStorage.getItem(STORAGE_KEYS.MOOD, (e, v) => { if (!e && v) appData.mood = JSON.parse(v); });
                    cloudStorage.getItem(STORAGE_KEYS.THEME, (e, v) => { if (!e && v) appData.theme = v; });
                } else {
                    const load = (key, target) => {
                        const saved = localStorage.getItem(key);
                        if (saved) appData[target] = JSON.parse(saved);
                    };
                    load(STORAGE_KEYS.CANCELLED_TRAININGS, 'cancelledTrainings');
                    load(STORAGE_KEYS.PROFILE, 'profile');
                    load(STORAGE_KEYS.USER_GROUPS, 'userGroups');
                    load(STORAGE_KEYS.TRAINING_NOTES, 'trainingNotes');
                    load(STORAGE_KEYS.TRAINING_FEEDBACK, 'trainingFeedback');
                    load(STORAGE_KEYS.NUTRITION, 'nutrition');
                    load(STORAGE_KEYS.MOOD, 'mood');
                    
                    const theme = localStorage.getItem(STORAGE_KEYS.THEME);
                    if (theme) appData.theme = theme;
                }
            } catch (e) {}
            
            applyTheme(appData.theme);
            checkAndAskFeedback();
        }

        // Сохранение данных
        function saveData() {
            try {
                const data = {
                    cancelledTrainings: appData.cancelledTrainings,
                    profile: appData.profile,
                    userGroups: appData.userGroups,
                    trainingNotes: appData.trainingNotes,
                    trainingFeedback: appData.trainingFeedback,
                    nutrition: appData.nutrition,
                    mood: appData.mood
                };
                
                if (cloudStorage) {
                    cloudStorage.setItem(STORAGE_KEYS.CANCELLED_TRAININGS, JSON.stringify(appData.cancelledTrainings), () => {});
                    cloudStorage.setItem(STORAGE_KEYS.PROFILE, JSON.stringify(appData.profile), () => {});
                    cloudStorage.setItem(STORAGE_KEYS.USER_GROUPS, JSON.stringify(appData.userGroups), () => {});
                    cloudStorage.setItem(STORAGE_KEYS.TRAINING_NOTES, JSON.stringify(appData.trainingNotes), () => {});
                    cloudStorage.setItem(STORAGE_KEYS.TRAINING_FEEDBACK, JSON.stringify(appData.trainingFeedback), () => {});
                    cloudStorage.setItem(STORAGE_KEYS.NUTRITION, JSON.stringify(appData.nutrition), () => {});
                    cloudStorage.setItem(STORAGE_KEYS.MOOD, JSON.stringify(appData.mood), () => {});
                    cloudStorage.setItem(STORAGE_KEYS.THEME, appData.theme, () => {});
                } else {
                    localStorage.setItem(STORAGE_KEYS.CANCELLED_TRAININGS, JSON.stringify(appData.cancelledTrainings));
                    localStorage.setItem(STORAGE_KEYS.PROFILE, JSON.stringify(appData.profile));
                    localStorage.setItem(STORAGE_KEYS.USER_GROUPS, JSON.stringify(appData.userGroups));
                    localStorage.setItem(STORAGE_KEYS.TRAINING_NOTES, JSON.stringify(appData.trainingNotes));
                    localStorage.setItem(STORAGE_KEYS.TRAINING_FEEDBACK, JSON.stringify(appData.trainingFeedback));
                    localStorage.setItem(STORAGE_KEYS.NUTRITION, JSON.stringify(appData.nutrition));
                    localStorage.setItem(STORAGE_KEYS.MOOD, JSON.stringify(appData.mood));
                    localStorage.setItem(STORAGE_KEYS.THEME, appData.theme);
                }
            } catch (e) {}
        }

        // Применение темы
        function applyTheme(theme) {
            const container = document.getElementById('appContainer');
            if (theme === 'light') {
                container.classList.add('light-theme');
            } else {
                container.classList.remove('light-theme');
            }
        }

        // Переключение темы
        window.setTheme = function(theme) {
            appData.theme = theme;
            applyTheme(theme);
            saveData();
            if (currentPage === 'profile') renderProfile();
        };

        // Проверка и запрос отзыва
        function checkAndAskFeedback() {
            const today = new Date().toISOString().split('T')[0];
            const todayTrainings = getTrainingsForDate(today).filter(t => !t.isCancelled);
            
            if (todayTrainings.length > 0) {
                const alreadyAsked = appData.trainingFeedback.some(f => f.date === today);
                if (!alreadyAsked) {
                    setTimeout(() => {
                        askTrainingFeedback(todayTrainings);
                    }, 1000);
                }
            }
        }

        // Запрос отзыва
        function askTrainingFeedback(trainings) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.setAttribute('onclick', 'closeModalIfOutside(event)');
            modal.innerHTML = `
                <div class="goal-modal-content" onclick="event.stopPropagation()">
                    <div class="goal-modal-title">Как прошла тренировка?</div>
                    <textarea class="goal-input" id="feedbackText" placeholder="Напишите свои впечатления..." rows="4" style="resize: none;"></textarea>
                    <div class="goal-buttons">
                        <button class="goal-btn goal-btn-secondary" onclick="closeModal()">Позже</button>
                        <button class="goal-btn goal-btn-primary" onclick="saveTrainingFeedback()">Отправить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // Сохранение отзыва
        window.saveTrainingFeedback = function() {
            const text = document.getElementById('feedbackText')?.value;
            if (text?.trim()) {
                appData.trainingFeedback.push({
                    date: new Date().toISOString().split('T')[0],
                    text: text.trim(),
                    timestamp: Date.now()
                });
                saveData();
                closeModal();
                showToast('Спасибо за отзыв!');
            }
        };

        // Рендер расписания
        function renderSchedule() {
            const content = document.getElementById('content');
            if (!content) return;
            
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startDay = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
            
            const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Окторябрь', 'Ноябрь', 'Декабрь'];
            const weekdays = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ', 'ВС'];
            
            let html = `
                <div class="calendar-wrapper">
                    <div class="calendar-header">
                        <button class="calendar-nav-btn" onclick="changeMonth(-1)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6" /></svg>
                        </button>
                        <h3>${months[month]} ${year}</h3>
                        <button class="calendar-nav-btn" onclick="changeMonth(1)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6" /></svg>
                        </button>
                    </div>
                    <div class="weekdays">${weekdays.map(d => `<div class="weekday">${d}</div>`).join('')}</div>
                    <div class="calendar-grid">
            `;
            
            for (let i = 0; i < startDay; i++) html += '<div class="calendar-day other-month"></div>';
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const trainings = getTrainingsForDate(dateStr);
                const activeTrainings = trainings.filter(t => !t.isCancelled);
                const hasTraining = activeTrainings.length > 0;
                const isSelected = selectedDate === dateStr;
                
                html += `
                    <div class="calendar-day ${hasTraining ? 'has-training' : ''} ${isSelected ? 'selected' : ''}" onclick="selectDate('${dateStr}')">
                        ${i}
                        ${activeTrainings.length > 0 ? `<span class="training-count">${activeTrainings.length}</span>` : ''}
                    </div>
                `;
            }
            
            html += '</div></div>';
            
            // Кнопка фильтра
            if (appData.userGroups.length > 0) {
                html += `
                    <button class="filter-btn ${filterEnabled ? 'active' : ''}" onclick="toggleFilter()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <polygon points="22 3 2 3 10 13 10 21 14 18 14 13 22 3" />
                        </svg>
                        ${filterEnabled ? 'Показать все' : 'Только мои группы'}
                    </button>
                `;
            }
            
            html += '<div class="trainings-container">';
            html += `<div class="trainings-title">📅 Тренировки <span>${formatDate(selectedDate)}</span></div>`;
            
            let trainings = getTrainingsForDate(selectedDate);
            
            // Фильтрация по группам
            if (filterEnabled && appData.userGroups.length > 0) {
                trainings = trainings.filter(t => appData.userGroups.includes(t.name));
            }
            
            if (trainings.length > 0) {
                trainings.forEach(t => {
                    const isCancelled = t.isCancelled;
                    const noteKey = `${selectedDate}_${t.time}_${t.name}`;
                    const hasNote = appData.trainingNotes[noteKey];
                    
                    html += `
                        <div class="training-item ${isCancelled ? 'cancelled' : ''}" onclick="openTrainingNote('${selectedDate}', '${t.time}', '${t.name.replace(/'/g, "\\'")}')">
                            <span class="training-time">${t.time}</span>
                            <span class="training-name">${t.name}</span>
                            ${hasNote ? '<span class="training-note-indicator"></span>' : ''}
                        </div>
                    `;
                });
            } else {
                html += '<div class="no-trainings">Нет тренировок</div>';
            }
            html += '</div>';
            
            content.innerHTML = html;
        }

        // Открыть заметку к тренировке
        window.openTrainingNote = function(date, time, name) {
            const noteKey = `${date}_${time}_${name}`;
            const existingNote = appData.trainingNotes[noteKey] || '';
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.setAttribute('onclick', 'closeModalIfOutside(event)');
            modal.innerHTML = `
                <div class="goal-modal-content" onclick="event.stopPropagation()">
                    <div class="goal-modal-title">Заметка</div>
                    <div style="margin-bottom: 8px; color: var(--text-secondary);">${time} • ${name}</div>
                    <textarea class="goal-input" id="trainingNoteText" placeholder="Ваши заметки..." rows="6" style="resize: none;">${existingNote}</textarea>
                    <div class="goal-buttons">
                        <button class="goal-btn goal-btn-secondary" onclick="closeModal()">Отмена</button>
                        <button class="goal-btn goal-btn-primary" onclick="saveTrainingNote('${noteKey}')">Сохранить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('trainingNoteText')?.focus();
        };

        // Сохранить заметку
        window.saveTrainingNote = function(key) {
            const text = document.getElementById('trainingNoteText')?.value;
            if (text?.trim()) {
                appData.trainingNotes[key] = text.trim();
            } else {
                delete appData.trainingNotes[key];
            }
            saveData();
            closeModal();
            renderSchedule();
            showToast('Заметка сохранена');
        };

        // Переключение фильтра
        window.toggleFilter = function() {
            filterEnabled = !filterEnabled;
            renderSchedule();
        };

        // Рендер профиля
        function renderProfile() {
            const content = document.getElementById('content');
            if (!content) return;
            
            // График питания
            const today = new Date().toISOString().split('T')[0];
            const todayNutrition = appData.nutrition.filter(n => n.date === today);
            const totalCalories = todayNutrition.reduce((sum, n) => sum + (n.calories || 0), 0);
            const dailyNorm = 2000;
            const progressPercent = Math.min(100, (totalCalories / dailyNorm) * 100);
            
            let nutritionHtml = todayNutrition.map((item, index) => `
                <div class="nutrition-item">
                    <div class="nutrition-emoji">${item.emoji}</div>
                    <div class="nutrition-info">
                        <div class="nutrition-name">${item.name}</div>
                        <div class="nutrition-calories">${item.calories} ккал</div>
                    </div>
                    <div class="nutrition-delete" onclick="deleteNutrition(${index})">✕</div>
                </div>
            `).join('');
            
            // График настроения
            const todayMood = appData.mood.find(m => m.date === today);
            const lastWeekMood = appData.mood.slice(-7).reverse();
            
            let moodHistoryHtml = lastWeekMood.map(m => {
                const hasTraining = getTrainingsForDate(m.date).some(t => !t.isCancelled);
                const impactClass = hasTraining ? (m.value >= 3 ? 'positive' : 'negative') : '';
                const impactText = hasTraining ? (m.value >= 3 ? '👍 Тренировка помогла' : '👎 Тренировка не помогла') : '';
                
                return `
                    <div class="mood-day">
                        <span class="mood-date">${formatDate(m.date)}</span>
                        <span class="mood-emoji">${MOOD_EMOJIS[m.value]}</span>
                        ${impactText ? `<span class="mood-impact ${impactClass}">${impactText}</span>` : ''}
                    </div>
                `;
            }).join('');
            
            content.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">${tgUser.charAt(0).toUpperCase()}</div>
                    <div class="profile-info">
                        <div class="profile-name">${tgUser}</div>
                        <div class="profile-id">
                            Участник клуба
                            <div class="theme-toggle">
                                <div class="theme-circle light ${appData.theme === 'light' ? 'active' : ''}" onclick="setTheme('light')"></div>
                                <div class="theme-circle dark ${appData.theme === 'dark' ? 'active' : ''}" onclick="setTheme('dark')"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="group-section">
                    <div class="group-title">Мои группы (макс. 2)</div>
                    <select class="group-selector" id="groupSelect" onchange="addUserGroup()">
                        <option value="">Выберите группу</option>
                        ${ALL_GROUPS.map(group => 
                            `<option value="${group}" ${appData.userGroups.includes(group) ? 'disabled' : ''}>${group}</option>`
                        ).join('')}
                    </select>
                    <div class="selected-groups" id="selectedGroups">
                        ${appData.userGroups.map(group => `
                            <span class="group-tag">
                                ${group}
                                <button onclick="removeUserGroup('${group}')">✕</button>
                            </span>
                        `).join('')}
                    </div>
                </div>
                
                <div class="nutrition-section">
                    <div class="group-title">🍽️ График питания</div>
                    <div class="nutrition-summary">
                        <div class="nutrition-total">
                            <div class="value">${totalCalories}</div>
                            <div class="label">ккал</div>
                        </div>
                        <div class="nutrition-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progressPercent}%;"></div>
                            </div>
                            <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted);">
                                <span>0</span>
                                <span>${dailyNorm} ккал</span>
                            </div>
                        </div>
                    </div>
                    <div class="nutrition-items" id="nutritionItems">
                        ${nutritionHtml || '<div style="text-align: center; padding: 20px; color: var(--text-muted);">Нет записей сегодня</div>'}
                    </div>
                    <div class="add-nutrition-btn" onclick="addNutrition()">
                        <span>+</span> Добавить еду или напиток
                    </div>
                </div>
                
                <div class="mood-section">
                    <div class="group-title">😊 Настроение</div>
                    <div class="mood-selector">
                        ${MOOD_EMOJIS.map((emoji, i) => `
                            <button class="mood-btn ${todayMood && todayMood.value === i ? 'selected' : ''}" onclick="setMood(${i})">${emoji}</button>
                        `).join('')}
                    </div>
                    <div class="mood-history">
                        ${moodHistoryHtml || '<div style="text-align: center; padding: 20px; color: var(--text-muted);">Нет записей о настроении</div>'}
                    </div>
                </div>
            `;
        }

        // Добавление группы
        window.addUserGroup = function() {
            const select = document.getElementById('groupSelect');
            const group = select.value;
            if (group && !appData.userGroups.includes(group) && appData.userGroups.length < 2) {
                appData.userGroups.push(group);
                saveData();
                renderProfile();
                if (currentPage === 'schedule') renderSchedule();
            }
        };

        // Удаление группы
        window.removeUserGroup = function(group) {
            appData.userGroups = appData.userGroups.filter(g => g !== group);
            saveData();
            renderProfile();
            if (currentPage === 'schedule') renderSchedule();
        };

        // Добавление питания
        window.addNutrition = function() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.setAttribute('onclick', 'closeModalIfOutside(event)');
            
            const emojiButtons = FOOD_EMOJIS.map(e => `
                <button class="mood-btn" onclick="selectNutritionEmoji('${e}')" style="width: 40px; height: 40px;">${e}</button>
            `).join('');
            
            modal.innerHTML = `
                <div class="goal-modal-content" onclick="event.stopPropagation()" style="max-width: 320px;">
                    <div class="goal-modal-title">Добавить запись</div>
                    <div style="margin-bottom: 12px;">
                        <div style="margin-bottom: 8px; color: var(--text-secondary);">Выберите эмодзи:</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;">${emojiButtons}</div>
                    </div>
                    <input type="text" class="goal-input" id="nutritionName" placeholder="Название" autofocus>
                    <input type="number" class="goal-input" id="nutritionCalories" placeholder="Калории" min="0">
                    <div class="goal-buttons">
                        <button class="goal-btn goal-btn-secondary" onclick="closeModal()">Отмена</button>
                        <button class="goal-btn goal-btn-primary" onclick="saveNutrition()">Сохранить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            window.selectNutritionEmoji = function(emoji) {
                document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
                event.target.classList.add('selected');
                window.selectedEmoji = emoji;
            };
        };

        // Сохранение питания
        window.saveNutrition = function() {
            const name = document.getElementById('nutritionName')?.value;
            const calories = parseInt(document.getElementById('nutritionCalories')?.value);
            
            if (name && !isNaN(calories) && window.selectedEmoji) {
                appData.nutrition.push({
                    date: new Date().toISOString().split('T')[0],
                    name: name,
                    calories: calories,
                    emoji: window.selectedEmoji
                });
                saveData();
                closeModal();
                renderProfile();
                showToast('Добавлено');
            }
        };

        // Удаление записи питания
        window.deleteNutrition = function(index) {
            const today = new Date().toISOString().split('T')[0];
            const todayItems = appData.nutrition.filter(n => n.date === today);
            const item = todayItems[index];
            appData.nutrition = appData.nutrition.filter(n => !(n.date === today && n.name === item.name && n.calories === item.calories));
            saveData();
            renderProfile();
        };

        // Установка настроения
        window.setMood = function(value) {
            const today = new Date().toISOString().split('T')[0];
            const existing = appData.mood.findIndex(m => m.date === today);
            
            if (existing >= 0) {
                appData.mood[existing].value = value;
            } else {
                appData.mood.push({
                    date: today,
                    value: value
                });
            }
            
            saveData();
            renderProfile();
            showToast('Настроение сохранено');
        };

        // Получение тренировок для даты
        function getTrainingsForDate(dateStr) {
            const date = new Date(dateStr);
            const dayOfWeek = date.getDay();
            const weeklyTrainings = WEEKLY_SCHEDULE[dayOfWeek] || [];
            const cancelledForDate = appData.cancelledTrainings[dateStr] || [];
            
            return weeklyTrainings.map(training => {
                const trainingKey = `${training.time} ${training.name}`;
                return {
                    ...training,
                    isCancelled: cancelledForDate.includes(trainingKey)
                };
            });
        }

        // Расписание
        window.changeMonth = function(delta) {
            currentMonth.setMonth(currentMonth.getMonth() + delta);
            renderSchedule();
        };

        window.selectDate = function(date) {
            selectedDate = date;
            renderSchedule();
        };

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}.${m}`;
        }

        // Админ панель
        function initAdminTrigger() {
            const trigger = document.getElementById('adminTrigger');
            trigger.addEventListener('click', () => {
                if (!isAdmin) {
                    document.getElementById('adminLoginModal').classList.add('active');
                    document.getElementById('adminOverlay').classList.add('active');
                } else {
                    openAdminPanel();
                }
            });
        }

        function openAdminPanel() {
            const panel = document.getElementById('adminPanel');
            const list = document.getElementById('adminFeedbackList');
            
            list.innerHTML = appData.trainingFeedback.map(f => `
                <div class="feedback-item">
                    <div class="feedback-date">${f.date}</div>
                    <div class="feedback-text">${f.text}</div>
                </div>
            `).join('') || '<div style="color: var(--text-muted); padding: 12px;">Нет отзывов</div>';
            
            panel.classList.add('active');
            document.getElementById('adminOverlay').classList.add('active');
        }

        window.closeAdminLogin = function() {
            document.getElementById('adminLoginModal').classList.remove('active');
            document.getElementById('adminOverlay').classList.remove('active');
        };

        window.closeAdminPanel = function() {
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('adminOverlay').classList.remove('active');
        };

        window.checkAdminPassword = function() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'admin123') {
                isAdmin = true;
                closeAdminLogin();
                updateAdminBadge();
                renderSchedule();
                openAdminPanel();
                showToast('Режим администратора активирован');
            } else {
                showToast('Неверный пароль');
            }
        };

        window.logoutAdmin = function() {
            isAdmin = false;
            updateAdminBadge();
            closeAdminPanel();
            renderSchedule();
            showToast('Вы вышли из админа');
        };

        function updateAdminBadge() {
            const badge = document.getElementById('adminBadge');
            badge.classList.toggle('active', isAdmin);
        }

        // Вспомогательные функции
        window.closeModal = function() {
            document.querySelector('.modal')?.remove();
        };

        window.closeModalIfOutside = function(event) {
            if (event.target.classList.contains('modal')) {
                closeModal();
            }
        };

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            renderSchedule();
            initAdminTrigger();
            updateAdminBadge();
        });

        // Переключение страниц
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                currentPage = item.dataset.page;
                
                if (currentPage === 'schedule') {
                    renderSchedule();
                } else if (currentPage === 'profile') {
                    renderProfile();
                }
            });
        });
    </script>
</body>
</html>
