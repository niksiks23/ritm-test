<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>РИТМ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #9d4edd;
            --primary-dark: #7b2cbf;
            --secondary: #00bbf9;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(20, 10, 30, 0.7);
            --glass-border: rgba(157, 78, 221, 0.2);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            --cancel-color: #ff4b4b;
            --admin-badge: #ff006e;
            --success: #00bbf9;
            --goal-1: #9d4edd;
            --goal-2: #00bbf9;
            --goal-3: #ff9f1c;
            --celebration: #ffd700;
            --notification: #ff9f1c;
            --app-bg: linear-gradient(145deg, #0f0f1a 0%, #1a1025 100%);
            --header-bg: linear-gradient(180deg, rgba(26, 16, 37, 0.95) 0%, rgba(26, 16, 37, 0.8) 100%);
            --modal-bg: #1a1025;
            --note-bg: rgba(157, 78, 221, 0.15);
            --filter-bg: rgba(157, 78, 221, 0.2);
            --filter-empty: rgba(255, 255, 255, 0.05);
            --chart-line: #9d4edd;
            --chart-grid: rgba(255, 255, 255, 0.1);
            --food-color: #ff9f1c;
            --water-color: #00bbf9;
            --calorie-bg: rgba(255, 159, 28, 0.15);
            --mood-1: #ff4b4b;
            --mood-2: #ff9f1c;
            --mood-3: #f1c40f;
            --mood-4: #2ecc71;
            --mood-5: #00bbf9;
            --chart-gradient-1: #9d4edd;
            --chart-gradient-2: #00bbf9;
            --mood-bg: rgba(157, 78, 221, 0.1);
        }

        body.light-theme {
            --primary: #0066cc;
            --primary-dark: #0052a3;
            --secondary: #4da6ff;
            --bg-dark: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 102, 204, 0.2);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --cancel-color: #dc2626;
            --admin-badge: #2563eb;
            --success: #059669;
            --goal-1: #2563eb;
            --goal-2: #4f46e5;
            --goal-3: #ea580c;
            --celebration: #fbbf24;
            --notification: #f97316;
            --app-bg: linear-gradient(145deg, #f1f5f9 0%, #ffffff 100%);
            --header-bg: rgba(255, 255, 255, 0.95);
            --modal-bg: #ffffff;
            --note-bg: rgba(0, 102, 204, 0.1);
            --filter-bg: rgba(0, 102, 204, 0.15);
            --filter-empty: rgba(0, 0, 0, 0.03);
            --chart-line: #0066cc;
            --chart-grid: rgba(0, 0, 0, 0.1);
            --food-color: #ea580c;
            --water-color: #0284c7;
            --calorie-bg: rgba(234, 88, 12, 0.1);
            --mood-1: #ef4444;
            --mood-2: #f97316;
            --mood-3: #eab308;
            --mood-4: #10b981;
            --mood-5: #3b82f6;
            --chart-gradient-1: #0066cc;
            --chart-gradient-2: #4da6ff;
            --mood-bg: rgba(0, 102, 204, 0.1);
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            transition: background-color 0.3s ease;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            height: 100dvh;
            background: var(--app-bg);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            margin: 0 auto;
            transition: background 0.3s ease;
        }

        .app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        .app-header {
            padding: 18px 20px 10px;
            text-align: center;
            background: var(--header-bg);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            position: relative;
            transition: background 0.3s ease;
        }

        .app-header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            cursor: pointer;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            transition: all 0.2s ease;
        }

        .app-header p {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .admin-badge {
            position: absolute;
            top: 10px;
            right: 15px;
            background: var(--admin-badge);
            color: white;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .admin-badge.active {
            opacity: 1;
        }

        .nav-bar {
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 12px;
            background: rgba(26, 16, 37, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            gap: 5px;
        }

        body.light-theme .nav-bar {
            background: rgba(255, 255, 255, 0.9);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            padding: 8px 0;
            border-radius: 20px;
            flex: 1;
            max-width: 120px;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            transition: all 0.2s ease;
        }

        .nav-item.active svg {
            color: var(--primary);
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 18px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .content::-webkit-scrollbar {
            display: none;
        }

        /* Новый дизайн графиков */
        .charts-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .chart-card-modern {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .chart-header-modern {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title-modern {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-icon {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .chart-title-text h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .chart-subtitle {
            font-size: 12px;
            color: var(--text-muted);
        }

        .chart-date-modern {
            background: var(--filter-empty);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Статистика питания */
        .nutrition-stats {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            flex: 1;
            background: var(--filter-empty);
            border-radius: 20px;
            padding: 14px 8px;
            text-align: center;
            border: 1px solid var(--glass-border);
        }

        .stat-value-large {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .stat-label-small {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .stat-badge-modern {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
            margin-top: 6px;
        }

        .stat-badge-modern.good {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .stat-badge-modern.bad {
            background: rgba(255, 75, 75, 0.2);
            color: var(--cancel-color);
        }

        .stat-badge-modern.normal {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
        }

        /* Современный линейный график */
        .calorie-chart {
            margin: 20px 0 25px;
            padding: 10px 0;
        }

        .chart-container {
            position: relative;
            height: 140px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            gap: 8px;
        }

        .chart-bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: relative;
            height: 100%;
            justify-content: flex-end;
        }

        .chart-bar-modern {
            width: 100%;
            max-width: 30px;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 20px 20px 8px 8px;
            min-height: 4px;
            transition: height 0.3s ease;
            box-shadow: 0 4px 12px rgba(157, 78, 221, 0.3);
            position: relative;
            z-index: 2;
        }

        .chart-value {
            font-size: 10px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .chart-label-modern {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Список питания */
        .food-section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 12px;
        }

        .food-section-title h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .food-count {
            background: var(--filter-bg);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
        }

        .food-list-modern {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .food-item-modern {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--filter-empty);
            border-radius: 18px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .food-item-modern:active {
            transform: scale(0.98);
            background: var(--filter-bg);
        }

        .food-emoji-modern {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
        }

        .food-info-modern {
            flex: 1;
        }

        .food-name-modern {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .food-meta-modern {
            display: flex;
            gap: 12px;
            font-size: 11px;
        }

        .food-time {
            color: var(--text-muted);
        }

        .food-calories-modern {
            color: var(--food-color);
            font-weight: 600;
        }

        .food-type-badge {
            color: var(--water-color);
        }

        .add-food-btn-modern {
            width: 100%;
            padding: 14px;
            background: var(--filter-empty);
            border: 1px dashed var(--glass-border);
            border-radius: 18px;
            color: var(--text-muted);
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s ease;
        }

        .add-food-btn-modern:active {
            background: var(--filter-bg);
        }

        /* График настроения */
        .mood-grid-modern {
            display: flex;
            gap: 8px;
            margin: 20px 0;
        }

        .mood-card {
            flex: 1;
            background: var(--filter-empty);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mood-card.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            transform: scale(1.02);
        }

        .mood-emoji-large {
            font-size: 28px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
        }

        .mood-label-small {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .mood-card.active .mood-label-small {
            color: white;
        }

        /* Таймлайн настроения */
        .mood-timeline-modern {
            background: var(--filter-empty);
            border-radius: 20px;
            padding: 16px;
            margin-top: 16px;
            border: 1px solid var(--glass-border);
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .timeline-header h4 {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mood-summary-badge {
            background: var(--mood-bg);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
        }

        .timeline-periods {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .period-block {
            flex: 1;
            text-align: center;
        }

        .period-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .period-emoji {
            width: 44px;
            height: 44px;
            margin: 0 auto 6px;
            border-radius: 22px;
            background: var(--filter-empty);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .period-emoji.filled {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
        }

        .period-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* График настроения за неделю */
        .mood-week-chart {
            margin-top: 20px;
            padding: 16px;
            background: var(--filter-empty);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .mood-week-title {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mood-week-grid {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            gap: 8px;
            height: 120px;
        }

        .mood-week-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            height: 100%;
            justify-content: flex-end;
        }

        .mood-week-bar {
            width: 100%;
            max-width: 30px;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 20px 20px 8px 8px;
            min-height: 4px;
            transition: height 0.3s ease;
            box-shadow: 0 4px 12px rgba(157, 78, 221, 0.3);
        }

        .mood-week-emoji {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .mood-week-label {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* Анализ настроения */
        .mood-analysis {
            margin-top: 16px;
            padding: 14px;
            background: var(--mood-bg);
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .analysis-icon {
            width: 36px;
            height: 36px;
            border-radius: 18px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .analysis-text {
            flex: 1;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .analysis-text strong {
            color: var(--primary);
            font-weight: 600;
        }

        .filter-compact {
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 18px;
            border: 1px solid var(--glass-border);
        }

        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .filter-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-title svg {
            width: 16px;
            height: 16px;
            color: var(--primary);
        }

        .filter-badge {
            background: var(--filter-bg);
            color: var(--primary);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .filter-clear {
            color: var(--primary);
            font-size: 12px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 12px;
            background: var(--filter-bg);
        }

        .filter-rows {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--filter-empty);
            border-radius: 16px;
            padding: 6px 12px 6px 16px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-row.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
        }

        .filter-row.active .row-label,
        .filter-row.active .row-group {
            color: white;
        }

        .row-icon {
            font-size: 14px;
            color: var(--text-muted);
        }

        .row-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 45px;
        }

        .row-group {
            flex: 1;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row-group.empty {
            color: var(--text-muted);
            font-style: italic;
        }

        .row-remove {
            width: 24px;
            height: 24px;
            border-radius: 12px;
            background: rgba(255, 75, 75, 0.2);
            color: var(--cancel-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 2000;
            padding: 16px;
            box-sizing: border-box;
        }

        .group-select-modal {
            width: 100%;
            max-width: 320px;
            background: var(--modal-bg);
            border-radius: 28px;
            padding: 24px 20px;
            border: 2px solid var(--primary);
            box-shadow: 0 20px 40px rgba(157, 78, 221, 0.4);
        }

        .modal-title {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .food-modal {
            width: 100%;
            max-width: 340px;
            background: var(--modal-bg);
            border-radius: 28px;
            padding: 24px 20px;
            border: 2px solid var(--primary);
        }

        .food-type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .food-type-btn {
            flex: 1;
            padding: 12px;
            background: var(--filter-empty);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .food-type-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin: 16px 0;
            max-height: 200px;
            overflow-y: auto;

            'Ритмика (3-5 лет)',

        const DRINK_EMOJIS = ['🥤', '🧃', '🧋', '🍵', '🍶', '🥛', '☕', '🍼', '🧉', '🍺', '🍻', '🥂', '🍷', '🥃', '🍸', '🍹', '🍾', '🧊', '💧', '🚰'];

        // Данные приложения
        let appData = {

            userGroup: '',

            selectedGroups: [],
            foodEntries: [],
            moodEntries: []
        };
        
        let currentPage = 'schedule';
        let selectedDate = new Date().toISOString().split('T')[0];
        let currentMonth = new Date();
        let isAdmin = false;

        let tgUser = 'Танцор';
        let activeFilterRow = null;
        let currentFoodType = 'food';

        // Инициализация Telegram
        try {
            if (window.Telegram && Telegram.WebApp) {
                tg = Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    tgUser = user.first_name || user.username || 'Танцор';
                }
                
                cloudStorage = tg.CloudStorage;
            }
        } catch (e) {
            console.log('Не удалось инициализировать Telegram:', e);
        }

        // Функции для работы с темой
        function setTheme(theme) {
            if (theme === 'light') {
                document.body.classList.add('light-theme');
            } else {
                document.body.classList.remove('light-theme');
            }
            
            try {
                if (cloudStorage) {
                    cloudStorage.setItem(STORAGE_KEYS.THEME, theme, () => {});
                } else {
                    localStorage.setItem(STORAGE_KEYS.THEME, theme);
                }
            } catch (e) {}
        }

        function loadTheme() {
            return new Promise((resolve) => {
                try {
                    if (cloudStorage) {
                        cloudStorage.getItem(STORAGE_KEYS.THEME, (error, value) => {
                            if (!error && value) {
                                setTheme(value);
                            } else {
                                setTheme('dark');
                            }
                            resolve();
                        });
                    } else {
                        const savedTheme = localStorage.getItem(STORAGE_KEYS.THEME);
                        if (savedTheme) {
                            setTheme(savedTheme);
                        } else {
                            setTheme('dark');
                        }
                        resolve();
                    }
                } catch (e) {
                    setTheme('dark');
                    resolve();
                }
            });
        }

        // Загрузка данных
        function loadData() {
            try {
                if (cloudStorage) {
                    cloudStorage.getItem(STORAGE_KEYS.CANCELLED_TRAININGS, (error, value) => {
                        if (!error && value) {
                            try {
                                appData.cancelledTrainings = JSON.parse(value);
                                if (currentPage === 'schedule') renderSchedule();
                            } catch (e) {}
                        }
                    });
                    
                    cloudStorage.getItem(STORAGE_KEYS.PROFILE, (error, value) => {
                        if (!error && value) {
                            try {
                                appData.profile = JSON.parse(value);
                                if (currentPage === 'profile') renderProfile();
                            } catch (e) {}
                        }
                    });
                    
                    cloudStorage.getItem(STORAGE_KEYS.USER_GROUP, (error, value) => {
                        if (!error && value) {
                            appData.userGroup = value;
                            if (currentPage === 'profile') renderProfile();
                        }
                    });
                    
                    cloudStorage.getItem(STORAGE_KEYS.NOTIFICATIONS, (error, value) => {
                        if (!error && value) {
                            try {
                                appData.notifications = JSON.parse(value);
                                if (currentPage === 'profile') renderProfile();
                            } catch (e) {}
                        }
                    });

                    cloudStorage.getItem(STORAGE_KEYS.TRAINING_NOTES, (error, value) => {
                        if (!error && value) {
                            try {
                                appData.trainingNotes = JSON.parse(value);
                                if (currentPage === 'schedule') renderSchedule();
                            } catch (e) {}

        function getTrainingsForDate(dateStr) {

        // Получить дни текущей недели (пн-вс)
        function getCurrentWeekDays() {
            const days = [];
            const today = new Date();
            const currentDay = today.getDay(); // 0 - воскресенье, 1 - понедельник, ...
            
            // Находим понедельник (если сегодня воскресенье, то понедельник был 6 дней назад)
            const mondayOffset = currentDay === 0 ? -6 : 1 - currentDay;
            const monday = new Date(today);
            monday.setDate(today.getDate() + mondayOffset);
            
            for (let i = 0; i < 7; i++) {
                const date = new Date(monday);
                date.setDate(monday.getDate() + i);
                days.push({
                    date: date.toISOString().split('T')[0],
                    label: i === 0 ? 'Пн' : i === 1 ? 'Вт' : i === 2 ? 'Ср' : i === 3 ? 'Чт' : i === 4 ? 'Пт' : i === 5 ? 'Сб' : 'Вс',
                    fullLabel: i === 0 ? 'Понедельник' : i === 1 ? 'Вторник' : i === 2 ? 'Среда' : i === 3 ? 'Четверг' : i === 4 ? 'Пятница' : i === 5 ? 'Суббота' : 'Воскресенье'
                });
            }
            
            return days;
        }

        // Рассчитать статистику питания
        function calculateNutritionStats(entries) {
            const totalCalories = entries.reduce((sum, entry) => sum + (entry.calories || 0), 0);
            const foodCount = entries.filter(e => e.type === 'food').length;
            const drinkCount = entries.filter(e => e.type === 'drink').length;
            
            const calorieGoal = 2000;
            
            let status = 'normal';
            let statusText = 'В норме';
            
            if (totalCalories < 1500) {
                status = 'bad';
                statusText = 'Мало калорий';
            } else if (totalCalories > 2500) {
                status = 'bad';
                statusText = 'Много калорий';
            } else if (totalCalories >= 1800 && totalCalories <= 2200) {
                status = 'good';
                statusText = 'Отлично!';
            }
            
            return {
                totalCalories,
                foodCount,
                drinkCount,
                status,
                statusText
            };
        }

        // Получить данные для графика калорий (текущая неделя пн-вс)
        function getCalorieChartData() {
            const weekDays = getCurrentWeekDays();
            
            return weekDays.map(day => {
                const entries = getFoodEntriesForDate(day.date);
                const totalCalories = entries.reduce((sum, e) => sum + (e.calories || 0), 0);
                
                return {
                    date: day.date,
                    label: day.label,
                    fullLabel: day.fullLabel,
                    value: totalCalories,
                    percent: Math.min(100, Math.round((totalCalories / 2000) * 100))
                };
            });
        }

        // Получить данные для графика настроения (текущая неделя пн-вс)
        function getMoodChartData() {
            const weekDays = getCurrentWeekDays();
            const moodEmojis = ['😫', '😕', '😐', '🙂', '😊'];
            
            return weekDays.map(day => {
                const dayMoods = getMoodEntriesForDate(day.date);
                
                // Вычисляем среднее настроение за день
                if (dayMoods.length === 0) {
                    return {
                        date: day.date,
                        label: day.label,
                        fullLabel: day.fullLabel,
                        value: 0,
                        emoji: '❓',
                        hasData: false
                    };
                }
                
                // Группируем по периодам и берем последние значения
                const morning = dayMoods.find(m => m.period === 'morning');
                const afternoon = dayMoods.find(m => m.period === 'afternoon');
                const evening = dayMoods.find(m => m.period === 'evening');
                
                const moods = [];
                if (morning) moods.push(morning.mood);
                if (afternoon) moods.push(afternoon.mood);
                if (evening) moods.push(evening.mood);
                
                if (moods.length === 0) {
                    return {
                        date: day.date,
                        label: day.label,
                        fullLabel: day.fullLabel,
                        value: 0,
                        emoji: '❓',
                        hasData: false
                    };
                }
                
                const avgMood = moods.reduce((a, b) => a + b, 0) / moods.length;
                const moodLevel = Math.round(avgMood);
                
                return {
                    date: day.date,
                    label: day.label,
                    fullLabel: day.fullLabel,
                    value: moodLevel * 20, // 1 = 20%, 2 = 40%, 3 = 60%, 4 = 80%, 5 = 100%
                    emoji: moodEmojis[moodLevel - 1],
                    hasData: true,
                    moodValue: moodLevel
                };
            });
        }

        // Анализ настроения за сегодня
        function analyzeTodayMood() {
            const today = new Date().toISOString().split('T')[0];
            const todayMoods = getMoodEntriesForDate(today);
            
            if (todayMoods.length === 0) return null;
            
            const periods = ['morning', 'afternoon', 'evening'];
            const moodValues = [];
            const moodEmojis = ['😫', '😕', '😐', '🙂', '😊'];
            const moodTexts = ['Ужасное', 'Плохое', 'Нормальное', 'Хорошее', 'Отличное'];
            
            periods.forEach(period => {
                const entry = todayMoods.find(e => e.period === period);
                if (entry) moodValues.push(entry.mood);
            });
            
            if (moodValues.length === 0) return null;
            
            const avgMood = moodValues.reduce((a, b) => a + b, 0) / moodValues.length;
            const moodLevel = Math.round(avgMood) - 1;
            
            let trend = '';
            if (moodValues.length >= 2) {
                const firstMood = moodValues[0];
                const lastMood = moodValues[moodValues.length - 1];
                
                if (lastMood > firstMood) {
                    trend = '📈 Настроение улучшается к вечеру';
                } else if (lastMood < firstMood) {
                    trend = '📉 Настроение ухудшается к вечеру';
                } else {
                    trend = '➡️ Настроение стабильно в течение дня';
                }
            }
            
            return {
                avgMood: Math.round(avgMood * 10) / 10,
                level: moodLevel,
                emoji: moodEmojis[moodLevel],
                text: moodTexts[moodLevel],
                trend: trend,
                details: `Сегодня у вас ${moodTexts[moodLevel].toLowerCase()} настроение ${moodEmojis[moodLevel]}`
            };
        }

                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6" /></svg>
                        </button>
                    </div>
                    <div class="weekdays">${weekdays.map(d => `<div class="weekday">${d}</div>`).join('')}</div>
                    <div class="calendar-grid">
            `;
            
            for (let i = 0; i < startDay; i++) html += '<div class="calendar-day other-month"></div>';
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const trainings = getTrainingsForDate(dateStr);
                const visibleTrainings = trainings.filter(t => !t.isCancelled && isTrainingVisible(t));
                const hasVisibleTraining = visibleTrainings.length > 0;
                const isSelected = selectedDate === dateStr;
                
                html += `
                    <div class="calendar-day ${hasVisibleTraining ? 'has-training' : ''} ${isSelected ? 'selected' : ''}" onclick="selectDate('${dateStr}')">
                        ${i}
                        ${visibleTrainings.length > 0 ? `<span class="training-count">${visibleTrainings.length}</span>` : ''}
                    </div>
                `;
            }
            
            html += '</div></div>';
            
            if (isAdmin) {
                html += `
                    <div class="admin-mode-banner" style="background: rgba(255,75,75,0.1); border: 1px dashed var(--cancel-color); border-radius: 12px; padding: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--cancel-color);">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="12" y1="8" x2="12" y2="12" />
                            <line x1="12" y1="16" x2="12.01" y2="16" />
                        </svg>
                        <span>Режим администратора: нажмите на тренировку чтобы отменить или восстановить (для всех)</span>
                    </div>
                `;
            }
            
            html += '<div class="trainings-container">';
            html += `<div class="trainings-title">📅 Тренировки <span>${formatDate(selectedDate)}</span></div>`;
            
            const trainings = getTrainingsForDate(selectedDate);
            const visibleTrainings = trainings.filter(t => isTrainingVisible(t));
            
            if (visibleTrainings.length > 0) {
                visibleTrainings.forEach(t => {
                    const isCancelled = t.isCancelled;
                    const hasNote = t.hasNote;
                    const cancelledClass = isCancelled ? 'cancelled' : '';
                    const noteClass = hasNote ? 'has-note' : '';
                    const adminClass = isAdmin ? 'admin-mode' : '';
                    
                    const clickHandler = isAdmin 
                        ? `toggleCancelTraining('${selectedDate}', '${t.time}', '${t.name.replace(/'/g, "\\'")}')`
                        : `openNoteModal('${selectedDate}', '${t.time}', '${t.name.replace(/'/g, "\\'")}', '${(appData.trainingNotes[`${selectedDate}_${t.time} ${t.name}`] || '').replace(/'/g, "\\'")}')`;
                    
                    html += `
                        <div class="training-item ${adminClass} ${cancelledClass} ${noteClass}" onclick="${clickHandler}">
                            <span class="training-time">${t.time}</span>
                            <span class="training-name">${t.name}</span>
                            ${hasNote ? '<span class="note-indicator">📝</span>' : ''}
                            ${isAdmin ? '<span class="training-cancel-btn" style="width:32px;height:32px;border-radius:16px;background:var(--cancel-color);display:flex;align-items:center;justify-content:center;color:white;">✕</span>' : ''}
                        </div>
                    `;
                });
            } else {
                if (trainings.length > 0) {
                    html += '<div class="no-trainings" style="padding:24px;text-align:center;background:rgba(255,255,255,0.02);border-radius:14px;color:var(--text-muted);">Нет занятий для выбранных групп</div>';

                    html += '<div class="no-trainings" style="padding:24px;text-align:center;background:rgba(255,255,255,0.02);border-radius:14px;color:var(--text-muted);">Нет тренировок</div>';
                }
            }
            html += '</div>';
            
            content.innerHTML = html;
        }

                appData.notifications.forEach(notif => {

                            <div class="delete-notification" onclick="deleteNotification(${notif.id})" style="position:absolute;top:12px;right:12px;width:32px;height:32px;background:rgba(255,75,75,0.1);border-radius:16px;display:flex;align-items:center;justify-content:center;color:var(--cancel-color);cursor:pointer;">✕</div>
                            <div class="notification-time" style="font-size:18px;font-weight:700;color:var(--notification);margin-bottom:4px;">⏰ ${notif.time}</div>

            const currentTheme = document.body.classList.contains('light-theme') ? 'light' : 'dark';
            
            content.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">${tgUser.charAt(0).toUpperCase()}</div>
                    <div class="profile-info">
                        <div class="profile-name">${tgUser}</div>
                        <div class="profile-id">Участник клуба</div>
                        <div class="theme-toggle">
                            <div class="theme-circle dark ${currentTheme === 'dark' ? 'active' : ''}" onclick="setTheme('dark')"></div>
                            <div class="theme-circle light ${currentTheme === 'light' ? 'active' : ''}" onclick="setTheme('light')"></div>
                        </div>
                    </div>
                </div>
                
                <div class="group-section">
                    <div class="group-title">Моя группа</div>
                    <select class="group-selector" id="userGroupSelect" onchange="selectUserGroup()">
                        <option value="">Выберите группу</option>
                        ${ALL_GROUPS.map(group => 
                            `<option value="${group}" ${appData.userGroup === group ? 'selected' : ''}>${group}</option>`
                        ).join('')}
                    </select>
                </div>
                
                <div class="notification-section">
                    <div class="notification-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="color: var(--text-primary);">Уведомления <span style="background: var(--notification); color: white; padding: 4px 10px; border-radius: 30px; font-size: 12px; margin-left: 8px;">${appData.notifications.length}/5</span></h3>
                        ${appData.notifications.length < 5 ? `
                            <button class="add-notification-btn" onclick="addNotification()" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; color: white; width: 44px; height: 44px; border-radius: 22px; font-size: 24px; cursor: pointer;">+</button>
                        ` : ''}
                    </div>
                    <div class="notification-list">${notificationsHtml}</div>

                <div class="goals-section">
                    <div class="goals-title" style="font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px;">Мои цели</div>
                    ${goalsHtml}
                    <div class="add-goal-btn" onclick="openAddGoalModal()" style="width:100%;padding:16px;background:rgba(255,255,255,0.02);border:1px dashed var(--glass-border);border-radius:16px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;margin-top:8px;">+ Добавить цель</div>

                <div class="charts-grid">

                                <div class="stat-badge-modern ${nutritionStats.status}">${nutritionStats.statusText}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value-large">${nutritionStats.foodCount}</div>
                                <div class="stat-label-small">приемов пищи</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value-large">${nutritionStats.drinkCount}</div>
                                <div class="stat-label-small">напитков</div>
                            </div>

                        <div style="margin: 10px 0 5px; color: var(--text-secondary); font-size: 12px;">Динамика за неделю (пн-вс)</div>
                        ${calorieChartHtml}
                        
                        <div class="food-section-title">

                            <span class="food-count">${todayFood.length} записей</span>
                        </div>

                            ${foodListHtml}
                        </div>
                        
                        <div class="add-food-btn-modern" onclick="openAddFoodModal()">
                            <span>+</span> Добавить запись
                        </div>
                    </div>

                                <span class="mood-summary-badge">${todayMoods.length}/3</span>

                        ${moodWeekChartHtml}

        // Обработчики для расписания
        window.changeMonth = function(delta) {
            currentMonth.setMonth(currentMonth.getMonth() + delta);
            renderSchedule();
        };

        window.selectDate = function(date) {
            selectedDate = date;
            renderSchedule();
        };

        window.toggleCancelTraining = function(date, time, name) {
            if (!isAdmin) return;
            
            const trainingKey = `${time} ${name}`;
            
            if (!appData.cancelledTrainings[date]) {
                appData.cancelledTrainings[date] = [];
            }
            
            const index = appData.cancelledTrainings[date].indexOf(trainingKey);
            
            if (index === -1) {
                appData.cancelledTrainings[date].push(trainingKey);
                showToast('❌ Тренировка отменена для всех');
            } else {
                appData.cancelledTrainings[date].splice(index, 1);
                showToast('✅ Тренировка восстановлена для всех');
            }
            
            if (appData.cancelledTrainings[date].length === 0) {
                delete appData.cancelledTrainings[date];
            }
            
            saveData();
            renderSchedule();
        };

        // Обработчики для профиля
        window.selectUserGroup = function() {
            const select = document.getElementById('userGroupSelect');
            if (select) {
                appData.userGroup = select.value;
                saveData();
                showToast('Группа сохранена');
            }
        };

        window.addNotification = function() {
            if (!appData.userGroup) {
                showToast('Сначала выберите группу');
                return;
            }
            
            if (appData.notifications.length >= 5) {
                showToast('Максимум 5 уведомлений');
                return;
            }
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.setAttribute('onclick', 'closeModalIfOutside(event)');
            modal.innerHTML = `
                <div class="goal-modal-content" onclick="event.stopPropagation()">
                    <div class="goal-modal-title">Новое напоминание</div>
                    <input type="time" class="goal-input" id="notifTime" value="18:00">
                    <div class="goal-buttons">
                        <button class="goal-btn goal-btn-secondary" onclick="closeModal()">Отмена</button>
                        <button class="goal-btn goal-btn-primary" onclick="saveNotification()">Сохранить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.saveNotification = function() {
            const timeInput = document.getElementById('notifTime');
            if (!timeInput?.value) return;
            
            const exists = appData.notifications.some(n => n.time === timeInput.value);
            if (exists) {
                showToast('Такое время уже есть');
                closeModal();
                return;
            }
            
            appData.notifications.push({
                id: Date.now(),
                time: timeInput.value,
                group: appData.userGroup,
                enabled: true
            });
            
            saveData();
            closeModal();
            renderProfile();
            showToast('Напоминание добавлено');
        };

        window.deleteNotification = function(id) {
            appData.notifications = appData.notifications.filter(n => n.id !== id);
            saveData();
            renderProfile();
            showToast('Напоминание удалено');
        };

        window.openAddGoalModal = function() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.setAttribute('onclick', 'closeModalIfOutside(event)');
            modal.innerHTML = `
                <div class="goal-modal-content" onclick="event.stopPropagation()">
                    <div class="goal-modal-title">Новая цель</div>
                    <input type="text" class="goal-input" id="goalText" placeholder="Например: Похудеть на 5 кг" autofocus>
                    <div class="goal-buttons">
                        <button class="goal-btn goal-btn-secondary" onclick="closeModal()">Отмена</button>
                        <button class="goal-btn goal-btn-primary" onclick="saveGoal()">Добавить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('goalText')?.focus();
        };

        window.saveGoal = function() {
            const input = document.getElementById('goalText');
            if (input?.value.trim()) {
                appData.profile.goals.push({
                    text: input.value.trim(),
                    progress: 0
                });
                saveData();
                closeModal();
                renderProfile();
                showToast('Цель добавлена');
            }
        };

        window.editGoalProgress = function(index) {
            const goal = appData.profile.goals[index];
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.setAttribute('onclick', 'closeModalIfOutside(event)');
            modal.innerHTML = `
                <div class="goal-modal-content" onclick="event.stopPropagation()">
                    <div class="goal-modal-title">Прогресс</div>
                    <div style="text-align:center; margin-bottom:16px; color:var(--text-secondary);">${goal.text}</div>
                    <input type="number" class="goal-input" id="goalProgress" value="${goal.progress}" min="0" max="100" autofocus>
                    <div class="goal-buttons">
                        <button class="goal-btn goal-btn-secondary" onclick="closeModal()">Отмена</button>
                        <button class="goal-btn goal-btn-primary" onclick="updateGoalProgress(${index})">Сохранить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('goalProgress')?.focus();
        };

        window.updateGoalProgress = function(index) {
            const input = document.getElementById('goalProgress');
            const progress = parseInt(input?.value);
            
            if (!isNaN(progress) && progress >= 0 && progress <= 100) {
                appData.profile.goals[index].progress = progress;
                saveData();
                closeModal();
                renderProfile();
                
                if (progress === 100) {
                    showToast('🎉 Поздравляем с достижением цели!');
                }
            }
        };

        window.deleteGoal = function(index) {
            if (confirm('Удалить цель?')) {
                appData.profile.goals.splice(index, 1);
                saveData();
                renderProfile();
                showToast('Цель удалена');
            }
        };

        // Админ панель
        function initAdminTrigger() {
            const trigger = document.getElementById('adminTrigger');
            trigger.addEventListener('click', () => {
                if (!isAdmin) {
                    document.getElementById('adminLoginModal').classList.add('active');
                    document.getElementById('adminOverlay').classList.add('active');
                } else {
                    document.getElementById('adminPanel').classList.add('active');
                    document.getElementById('adminOverlay').classList.add('active');
                }
            });
        }

        function updateAdminBadge() {
            const badge = document.getElementById('adminBadge');
            badge.classList.toggle('active', isAdmin);
        }

        window.closeAdminLogin = function() {
            document.getElementById('adminLoginModal').classList.remove('active');
            document.getElementById('adminOverlay').classList.remove('active');
        };

        window.closeAdminPanel = function() {
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('adminOverlay').classList.remove('active');
        };

        window.checkAdminPassword = function() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'admin123') {
                isAdmin = true;
                closeAdminLogin();
                updateAdminBadge();
                renderSchedule();
                setTimeout(() => {
                    document.getElementById('adminPanel').classList.add('active');
                    document.getElementById('adminOverlay').classList.add('active');
                }, 300);
                showToast('Режим администратора активирован');
            } else {
                showToast('Неверный пароль');
            }
        };

        window.logoutAdmin = function() {
            isAdmin = false;
            updateAdminBadge();
            closeAdminPanel();
            renderSchedule();
            showToast('Вы вышли из админа');
        };

        // Вспомогательные функции
        window.closeModal = function() {
            document.querySelector('.modal')?.remove();
            activeFilterRow = null;
        };

        window.closeModalIfOutside = function(event) {
            if (event.target.classList.contains('modal')) {
                closeModal();
            }
        };

        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', async () => {
            await loadTheme();
            loadData();
            renderSchedule();
            initAdminTrigger();
            updateAdminBadge();

            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                    item.classList.add('active');
                    currentPage = item.dataset.page;
                    
                    if (currentPage === 'schedule') {
                        renderSchedule();
                    } else if (currentPage === 'profile') {
                        renderProfile();
                    }
                });
            });
        });

        window.openNoteModal = openNoteModal;
    </script>
</body>
</html>
